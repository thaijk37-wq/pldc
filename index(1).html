<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Language" content="vi">
<title>PLĐC HUST – 10 đề trắc nghiệm</title>
<style>
:root{
  --red:#c8102e;
  --red-dark:#8f0b21;
  --navy:#172b4d;
  --navy-2:#29456f;
  --text:#172033;
  --muted:#667085;
  --line:#d8dee9;
  --surface:#ffffff;
  --background:#f2f5f9;
  --good:#157a42;
  --good-bg:#edf9f1;
  --bad:#b4232d;
  --bad-bg:#fff0f1;
  --hint:#855000;
  --hint-bg:#fff7e6;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  min-height:100vh;
  color:var(--text);
  font-family:"Segoe UI",Tahoma,Arial,"Helvetica Neue",sans-serif;
  font-size:16px;
  line-height:1.5;
  font-variant-ligatures:none;
  background:
    linear-gradient(rgba(23,43,77,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(23,43,77,.045) 1px,transparent 1px),
    linear-gradient(145deg,#fbfcfe 0%,#edf1f6 68%,#f8e9ed 100%);
  background-size:28px 28px,28px 28px,auto;
}
button,input{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.app{max-width:1120px;margin:0 auto;padding:20px}
.hero{
  color:white;
  background:linear-gradient(125deg,var(--navy),var(--navy-2));
  border-radius:22px;
  padding:20px;
  border-bottom:7px solid var(--red);
  box-shadow:0 16px 42px rgba(23,43,77,.22);
}
.brand{display:flex;align-items:center;gap:15px}
.logo{
  width:78px;height:78px;flex:0 0 78px;
  display:grid;place-items:center;
  color:var(--red);background:white;
  border:4px solid var(--red);
  border-radius:17px;
  font-size:21px;font-weight:950;
  box-shadow:0 5px 0 rgba(0,0,0,.2)
}
.school{font-size:13px;letter-spacing:1.1px;font-weight:850;color:#dce6f4}
h1{font-size:29px;line-height:1.15;margin:4px 0 6px}
.hero p{margin:0;color:#dce6f4}
.menu-title{margin:24px 2px 13px;font-size:22px;color:var(--navy)}
.quiz-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:15px;
}
.quiz-card{
  display:grid;
  grid-template-columns:1fr auto;
  gap:13px;
  align-items:center;
  padding:18px;
  background:var(--surface);
  border:1px solid var(--line);
  border-left:6px solid var(--red);
  border-radius:17px;
  box-shadow:0 8px 24px rgba(23,43,77,.08);
  transition:transform .14s ease,box-shadow .14s ease;
}
.quiz-card:hover{transform:translateY(-2px);box-shadow:0 13px 30px rgba(23,43,77,.13)}
.quiz-card.mixed{border-left-color:var(--navy)}
.quiz-card h2{margin:0 0 5px;font-size:19px;color:var(--navy)}
.quiz-card p{margin:0;color:var(--muted);font-size:13.5px}
.card-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px}
.mini-stat{
  min-width:108px;
  padding:7px 9px;
  border-radius:10px;
  background:#f1f4f8;
  border:1px solid #dce3ed;
}
.mini-stat span{display:block;font-size:11px;color:var(--muted)}
.mini-stat strong{display:block;margin-top:1px;font-size:14px;color:var(--navy)}
.mini-stat.in-progress{
  background:#fff3cd;
  border-color:#dfbf56;
}
.mini-stat.in-progress strong{color:#714b00}
.quiz-card.has-progress{
  outline:2px solid rgba(200,16,46,.18);
  box-shadow:0 10px 28px rgba(200,16,46,.12);
}

.start-button,.primary,.secondary{
  border:0;border-radius:11px;padding:11px 15px;font-weight:850
}
.start-button,.primary{
  color:white;background:var(--red);
  box-shadow:0 4px 0 var(--red-dark)
}
.start-button:hover,.primary:hover{background:#dc1739}
.secondary{
  color:var(--navy);background:#edf1f6;
  border:1px solid #cfd7e3;box-shadow:0 3px 0 #c7d0dd
}
.secondary:hover{background:#e4eaf2}
.menu-note{
  margin:16px 2px 0;
  padding:12px 14px;
  color:#35435a;
  background:#eef2f8;
  border:1px solid #d6dfeb;
  border-radius:12px;
  font-size:13px;
}
.quiz-header{
  display:flex;justify-content:space-between;align-items:center;gap:14px;
  margin:18px 0 12px;
}
.quiz-heading h2{margin:0;color:var(--navy);font-size:23px}
.quiz-heading p{margin:3px 0 0;color:var(--muted);font-size:13px}
.live-stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.live-stat{
  min-width:105px;padding:8px 10px;text-align:center;
  border-radius:11px;background:white;border:1px solid var(--line)
}
.live-stat span{display:block;color:var(--muted);font-size:11px}
.live-stat strong{display:block;color:var(--navy);font-size:16px}
.progress-shell{
  height:11px;margin:11px 0 15px;
  overflow:hidden;border-radius:999px;
  background:#dfe4ec;border:1px solid #cbd3df
}
.progress{height:100%;width:0;background:linear-gradient(90deg,var(--red),#ee4964);transition:width .25s}
.question-card{
  background:white;border:1px solid var(--line);border-top:6px solid var(--red);
  border-radius:20px;padding:24px;box-shadow:0 12px 34px rgba(27,45,74,.1)
}
.question-meta{
  display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
  color:var(--muted);font-size:13px
}
.question-source{
  display:inline-flex;margin:11px 0 2px;padding:7px 10px;
  border-radius:9px;background:#eef2f8;border:1px solid #d7dfeb;
  color:var(--navy);font-size:12.5px;font-weight:800
}
.question-text{margin:14px 0 18px;font-size:21px;line-height:1.45;font-weight:850;color:#101828}
.options{display:grid;gap:11px}
.option{
  display:flex;align-items:flex-start;gap:12px;padding:13px 14px;
  border:1.5px solid var(--line);border-radius:13px;background:white;cursor:pointer;
  transition:transform .12s,border-color .12s,box-shadow .12s
}
.option:hover{transform:translateY(-1px);border-color:#9daac0;box-shadow:0 5px 13px rgba(21,39,67,.08)}
.option input{margin-top:4px;transform:scale(1.15);accent-color:var(--red)}
.option.correct{border-color:#6fc18e;background:var(--good-bg)}
.option.wrong{border-color:#e3979d;background:var(--bad-bg)}
.option.disabled{cursor:default}
.letter{min-width:22px;color:var(--red);font-weight:950}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.actions button:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.panel{display:none;margin-top:15px;padding:13px 15px;border-radius:13px}
.panel.show{display:block}
.hint{color:var(--hint);background:var(--hint-bg);border:1px solid #efcd82}
.feedback.good{color:#105f31;background:var(--good-bg);border:1px solid #76c995}
.feedback.bad{color:#8f1b25;background:var(--bad-bg);border:1px solid #e49aa0}
.feedback strong{display:block;margin-bottom:5px}
.feedback-source{margin-bottom:5px;font-size:12px;font-weight:800;opacity:.82}
.toast{
  position:fixed;top:20px;left:50%;z-index:1000;
  width:min(430px,90vw);padding:14px 18px;
  color:white;text-align:center;font-weight:900;
  border-radius:14px;border:2px solid rgba(255,255,255,.8);
  box-shadow:0 12px 32px rgba(0,0,0,.28);
  transform:translate(-50%,-150%);transition:transform .28s
}
.toast.show{transform:translate(-50%,0)}
.toast.good{background:linear-gradient(135deg,#0d7136,#20a75a)}
.toast.bad{background:linear-gradient(135deg,#941624,#d72d3f)}
.result-card{
  padding:27px;text-align:center;background:white;
  border:1px solid var(--line);border-top:7px solid var(--red);
  border-radius:21px;box-shadow:0 14px 38px rgba(23,43,77,.12)
}
.final-message{
  margin:0 auto 12px;
  max-width:760px;
  color:var(--red);
  font-size:28px;line-height:1.25;font-weight:950
}
.result-score{font-size:49px;font-weight:950;color:var(--navy);margin:6px 0}
.result-grid{
  display:grid;grid-template-columns:repeat(3,minmax(0,1fr));
  gap:11px;max-width:650px;margin:17px auto
}
.result-stat{padding:12px;border-radius:12px;background:#f1f4f8;border:1px solid #dce3ed}
.result-stat span{display:block;color:var(--muted);font-size:12px}
.result-stat strong{display:block;margin-top:2px;color:var(--navy);font-size:18px}
.result-actions{display:flex;justify-content:center;gap:11px;flex-wrap:wrap;margin-top:18px}
.review{margin-top:25px;text-align:left}
.review h3{color:var(--navy)}
.review-item{padding:13px 0;border-top:1px solid var(--line)}
.review-item:first-child{border-top:0}
.review-item small{color:var(--muted)}
.sound-toggle{
  position:fixed;right:16px;bottom:16px;z-index:50;
  width:50px;height:50px;padding:0;border-radius:50%;
  color:var(--navy);background:white;border:3px solid var(--navy);
  box-shadow:4px 4px 0 var(--red);font-size:21px
}
@media(max-width:760px){
  .app{padding:12px}.quiz-grid{grid-template-columns:1fr}.quiz-card{grid-template-columns:1fr}
  .start-button{width:100%}.quiz-header{align-items:flex-start;flex-direction:column}
  .live-stats{justify-content:flex-start}.question-card{padding:18px}.question-text{font-size:18px}
  .result-grid{grid-template-columns:1fr}.final-message{font-size:23px}
  h1{font-size:23px}.logo{width:62px;height:62px;flex-basis:62px;font-size:17px}
}

.online-entry{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:16px 2px 2px;
}
.online-button{
  border:0;
  border-radius:12px;
  padding:12px 17px;
  font-weight:900;
  color:#fff;
  background:linear-gradient(135deg,#0c7a46,#14a864);
  box-shadow:0 4px 0 #075b34;
}
.online-button:hover{filter:brightness(1.05)}
.online-button.secondary-online{
  color:var(--navy);
  background:#fff;
  border:1px solid var(--line);
  box-shadow:0 3px 0 #c7d0dd;
}
.online-shell{
  margin-top:18px;
  background:#fff;
  border:1px solid var(--line);
  border-top:7px solid #0c7a46;
  border-radius:21px;
  padding:22px;
  box-shadow:0 14px 38px rgba(23,43,77,.12);
}
.online-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.online-top h2{margin:0;color:var(--navy)}
.online-sub{color:var(--muted);font-size:13px;margin-top:4px}
.online-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}
.online-card{
  padding:17px;
  border:1px solid var(--line);
  border-radius:15px;
  background:#f9fbfd;
}
.online-card h3{margin:0 0 8px;color:var(--navy)}
.online-card p{margin:5px 0;color:var(--muted);font-size:13px}
.online-form{
  display:grid;
  gap:10px;
}
.online-form label{
  display:grid;
  gap:5px;
  font-size:13px;
  color:var(--muted);
  font-weight:750;
}
.online-form input,
.online-form select,
.online-form textarea{
  width:100%;
  border:1px solid #cbd5e1;
  border-radius:10px;
  padding:10px 11px;
  background:#fff;
  color:var(--text);
}
.online-form textarea{
  min-height:150px;
  resize:vertical;
  font-family:Consolas,monospace;
  font-size:12px;
}
.online-actions{
  display:flex;
  gap:9px;
  flex-wrap:wrap;
  margin-top:12px;
}
.online-status{
  padding:10px 12px;
  border-radius:11px;
  background:#eef6ff;
  border:1px solid #c9ddf4;
  color:#23476f;
  font-size:13px;
}
.online-status.error{
  background:#fff0f1;
  border-color:#e49aa0;
  color:#8f1b25;
}
.online-status.success{
  background:#edf9f1;
  border-color:#76c995;
  color:#105f31;
}
.member-list{
  display:grid;
  gap:10px;
  margin-top:12px;
}
.member-card{
  padding:13px;
  border:1px solid var(--line);
  border-radius:13px;
  background:#fff;
}
.member-head{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
}
.member-name{font-weight:900;color:var(--navy)}
.presence{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:12px;
  font-weight:800;
}
.presence.online{color:#0d7a3f}
.presence.offline{color:#7a8494}
.member-meta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:8px;
}
.member-chip{
  padding:5px 8px;
  border-radius:999px;
  background:#eef2f8;
  border:1px solid #dae2ed;
  font-size:12px;
  color:#334155;
}
.ready-chip{background:#fff3cd;border-color:#dfbf56;color:#714b00}
.ready-chip.ready{background:#edf9f1;border-color:#76c995;color:#105f31}
.room-code{
  display:inline-flex;
  align-items:center;
  gap:7px;
  padding:7px 10px;
  border-radius:9px;
  background:#eef2f8;
  border:1px solid #d7dfeb;
  font-family:Consolas,monospace;
  font-size:12px;
}
.online-game-layout{
  display:grid;
  grid-template-columns:minmax(0,1fr) 290px;
  gap:15px;
}
.race-panel{
  padding:15px;
  border:1px solid var(--line);
  border-radius:15px;
  background:#f8fafc;
}
.race-panel h3{margin:0 0 10px;color:var(--navy)}
.online-question{
  padding:20px;
  border:1px solid var(--line);
  border-top:6px solid #0c7a46;
  border-radius:18px;
  background:#fff;
}
.online-question h3{
  margin:8px 0 16px;
  font-size:20px;
  color:#101828;
}
.online-options{display:grid;gap:10px}
.online-option{
  display:flex;
  gap:10px;
  align-items:flex-start;
  padding:12px 13px;
  border:1.5px solid var(--line);
  border-radius:12px;
  cursor:pointer;
  background:#fff;
}
.online-option:hover{border-color:#8fa4bf}
.online-option.selected{
  border-color:#0c7a46;
  background:#edf9f1;
}
.online-option input{margin-top:4px;accent-color:#0c7a46}
.waiting-box{
  padding:26px;
  text-align:center;
  border-radius:18px;
  background:#f8fafc;
  border:1px solid var(--line);
}
.waiting-box h2{color:var(--navy)}
.result-board{
  display:grid;
  gap:11px;
  margin:16px auto;
  max-width:650px;
}
.result-player{
  display:grid;
  grid-template-columns:45px 1fr auto;
  gap:10px;
  align-items:center;
  padding:13px;
  border:1px solid var(--line);
  border-radius:13px;
  background:#fff;
}
.result-rank{
  width:38px;height:38px;
  display:grid;place-items:center;
  border-radius:50%;
  background:#eef2f8;
  font-weight:950;
  color:var(--navy);
}
.result-player.winner{
  border-color:#dfbf56;
  background:#fffaf0;
}
.supervisor-table{
  width:100%;
  border-collapse:collapse;
  font-size:12.5px;
}
.supervisor-table th,
.supervisor-table td{
  padding:8px;
  border:1px solid #dbe2ec;
  text-align:left;
  vertical-align:top;
}
.supervisor-table th{
  background:#eef2f8;
  color:var(--navy);
}
.answer-right{color:#0d7a3f;font-weight:850}
.answer-wrong{color:#b4232d;font-weight:850}
.firebase-rules{
  min-height:230px!important;
  white-space:pre;
}
.connection-note{
  margin-top:12px;
  padding:9px 11px;
  border-radius:10px;
  background:#fff7e6;
  border:1px solid #efcd82;
  color:#795000;
  font-size:12.5px;
}
@media(max-width:820px){
  .online-grid{grid-template-columns:1fr}
  .online-game-layout{grid-template-columns:1fr}
}

</style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="brand">
      <div class="logo">HUST</div>
      <div>
        <div class="school">ĐẠI HỌC BÁCH KHOA HÀ NỘI</div>
        <h1>Pháp luật đại cương – Bộ 10 đề</h1>
        <p>9 đề gốc và 1 đề tổng hợp ngẫu nhiên, lưu kỷ lục và lượt làm trên trình duyệt.</p>
      </div>
    </div>
  </header>

  <section id="menuScreen">
    <h2 class="menu-title">Chọn đề để làm</h2>
    <div class="online-entry">
      <button class="online-button" id="onlineModeButton">🌐 Thi đấu online</button>
      <button class="online-button secondary-online hidden" id="recentOnlineRoomButton">Quay lại phòng gần đây</button>
    </div>

    <div class="quiz-grid" id="quizGrid"></div>
    <div class="menu-note" id="menuNote"></div>
  </section>

  
  <section id="onlineScreen" class="hidden">
    <div class="online-shell">
      <div id="onlineApp"></div>
    </div>
  </section>

  <section id="quizScreen" class="hidden">
    <div class="quiz-header">
      <div class="quiz-heading">
        <h2 id="activeQuizTitle"></h2>
        <p id="activeQuizSubtitle"></p>
      </div>
      <div class="live-stats">
        <div class="live-stat"><span>Điểm</span><strong id="liveScore">0</strong></div>
        <div class="live-stat"><span>Thời gian</span><strong id="liveTime">00:00</strong></div>
        <div class="live-stat"><span>Kỷ lục</span><strong id="liveBest">Chưa có</strong></div>
      </div>
    </div>

    <div class="progress-shell"><div class="progress" id="progressBar"></div></div>

    <div class="question-card" id="questionCard">
      <div class="question-meta">
        <strong id="questionProgress"></strong>
        <span id="questionCategory"></span>
      </div>
      <div class="question-source" id="questionSource"></div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="options"></div>

      <div class="actions">
        <button class="secondary" id="hintButton">Mở gợi ý</button>
        <button class="primary" id="checkButton" disabled>Kiểm tra</button>
        <button class="primary hidden" id="nextButton">Câu tiếp theo</button>
        <button class="secondary" id="leaveButton">Chọn đề khác</button>
      </div>

      <div class="panel hint" id="hintPanel"></div>
      <div class="panel feedback" id="feedbackPanel"></div>
    </div>
  </section>

  <section id="resultScreen" class="hidden"></section>
</div>

<button class="sound-toggle" id="soundToggle" title="Bật hoặc tắt âm thanh">🔊</button>
<div class="toast" id="toast"></div>

<script>
const FIXED_QUIZZES={"1":{"id":1,"title":"Đề 1","questions":[{"id":1,"q":"Pháp luật đại cương nằm trong tiểu hệ thống:","options":{"A":"Khoa học pháp lý quốc tế","B":"Khoa học pháp lý cơ bản","C":"Khoa học pháp lý chuyên ngành, liên ngành","D":"Khoa học pháp lý ứng dụng kỹ thuật"},"answer":"B","page":1,"uid":"de1_cau1","quiz":1,"category":"Lý luận chung về pháp luật","source":"Đề 1 · Câu 1 · Trang 1","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án B: Khoa học pháp lý cơ bản."},{"id":2,"q":"Theo quan điểm của Chủ nghĩa Mác - Lê Nin thì:","options":{"A":"Nhà nước do một cá nhân xuất chúng trong xã hội lập ra","B":"Nhà nước do các toàn thể thành viên trong xã hội thỏa thuận lập ra","C":"Nhà nước do giai cấp chiếm đa số trong xã hội lập ra","D":"Nhà nước do giai cấp thống trị trong xã hội lập ra"},"answer":"D","page":1,"uid":"de1_cau2","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 2 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Nhà nước do giai cấp thống trị trong xã hội lập ra."},{"id":3,"q":"Thuyết quyền gia trưởng giải thích sự ra đời của Nhà nước là do kết quả:","options":{"A":"Liên kết bộ lạc, bộ tộc","B":"Liên kết nhiều dòng họ","C":"Cả 03 phương án trên đều đúng","D":"Sự phát triển của gia đình"},"answer":"D","page":1,"uid":"de1_cau3","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 3 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Sự phát triển của gia đình."},{"id":4,"q":"Nhà nước là một hiện tượng lịch sử- xã hội:","options":{"A":"Có thể thay đổi theo ý chí của con người","B":"Bất biến","C":"Có thể thay đổi theo ý chí của giai cấp thống trị","D":"Có thể thay đổi theo quy luật tự nhiên khách quan"},"answer":"D","page":1,"uid":"de1_cau4","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 4 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Có thể thay đổi theo quy luật tự nhiên khách quan."},{"id":5,"q":"Tính xã hội của Nhà nước thể hiện ở việc:","options":{"A":"Nhà nước quan tâm đến toàn bộ các giai tầng trong xã hội","B":"Nhà nước quan tâm đến giai cấp giàu có trong xã hội","C":"Nhà nước quan tâm đến đội ngũ công chức nhà nước","D":"Nhà nước quan tâm đến giai cấp nghèo khó trong xã hội"},"answer":"A","page":1,"uid":"de1_cau5","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 5 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Nhà nước quan tâm đến toàn bộ các giai tầng trong xã hội."},{"id":6,"q":"Quyền lực nào tạo ra sự lệ thuộc cơ bản nhất giữa giai cấp bị trị với giai cấp thống trị:","options":{"A":"Quyền lực tư tưởng","B":"Quyền lực kinh tế","C":"Quyền lực chính trị","D":"Cả 3 đáp án đều đúng"},"answer":"B","page":1,"uid":"de1_cau6","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 6 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Quyền lực kinh tế."},{"id":7,"q":"Nhà nước phong kiến Việt Nam ghi nhận sự thống trị về tư tưởng của tôn giáo nào:","options":{"A":"Thiên chúa giáo","B":"Nho Giáo","C":"Cả Phật giáo và Nho giáo","D":"Phật giáo"},"answer":"C","page":2,"uid":"de1_cau7","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 7 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Cả Phật giáo và Nho giáo."},{"id":8,"q":"Đặc điểm nào sau đây không phải là dấu hiệu đặc trưng của nhà nước:","options":{"A":"Nhà nước phân chia dân cư căn cứ vào nghề nghiệp và địa vị xã hội của họ","B":"Nhà nước thiết lập một quyền lực công cộng đặc biệt, được bảo đảm thực hiện bằng một bộ máy cưỡng chế đặc thù","C":"Nhà nước có chủ quyền quốc gia","D":"Nhà nước ban hành các loại thuế và thực hiện thu thuế dưới hình thức bắt buộc"},"answer":"A","page":2,"uid":"de1_cau8","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 8 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Nhà nước phân chia dân cư căn cứ vào nghề nghiệp và địa vị xã hội của họ."},{"id":9,"q":"Tổ chức nào sau đây đóng vai trò trung tâm của hệ thống chính trị Việt Nam:","options":{"A":"Các tổ chức xã hội, xã hội nghề nghiệp","B":"Nhà nước","C":"Các tổ chức chính trị - xã hội","D":"Đảng phái chính trị"},"answer":"B","page":2,"uid":"de1_cau9","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 9 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Nhà nước."},{"id":10,"q":"Nhà nước phân chia cư dân và lãnh thổ nhằm:","options":{"A":"Thực hiện chức năng","B":"Quản lý xã hội","C":"Trấn áp giai cấp","D":"Thực hiện quyền lực"},"answer":"B","page":2,"uid":"de1_cau10","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 10 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Quản lý xã hội."},{"id":11,"q":"Các nhà nước phải tôn trọng và không can thiệp lẫn nhau vì:","options":{"A":"Nhà nước phân chia và quản lý cư dân của mình theo đơn vị hành chính - lãnh thổ","B":"Nhà nước có chủ quyền quốc gia","C":"Nhà nước có quyền lực công cộng đặc biệt","D":"Mỗi nhà nước có hệ thống pháp luật riêng"},"answer":"B","page":2,"uid":"de1_cau11","quiz":1,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 1 · Câu 11 · Trang 2","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án B: Nhà nước có chủ quyền quốc gia."},{"id":12,"q":"Nhà nước nào sau đây có hình thức cấu trúc nhà nước liên bang:","options":{"A":"Pháp","B":"Ấn Độ","C":"Việt Nam","D":"Trung Quốc"},"answer":"B","page":2,"uid":"de1_cau12","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 12 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Ấn Độ."},{"id":13,"q":"Chức năng của nhà nước là:","options":{"A":"Thực hiện những công việc trong phạm vi lãnh thổ quốc gia và công việc của nhà nước vượt ra ngoài phạm vi lãnh thổ quốc gia","B":"Thực hiện chính sách đối nội của nhà nước","C":"Thực hiện chính sách đối ngoại","D":"Thực hiện chính sách đối nội hoặc đối ngoại"},"answer":"A","page":2,"uid":"de1_cau13","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 13 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Thực hiện những công việc trong phạm vi lãnh thổ quốc gia và công việc của nhà nước vượt ra ngoài phạm vi lãnh thổ quốc gia."},{"id":14,"q":"Học thuyết được một số quốc gia trên thế giới áp dụng trong tổ chức bộ máy nhà nước là:","options":{"A":"Thuyết hàn Phi Tử","B":"Thuyết tam quyền phân lập","C":"Thuyết khế ước xã hội","D":"Thuyết bạo lực"},"answer":"B","page":2,"uid":"de1_cau14","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 14 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Thuyết tam quyền phân lập."},{"id":15,"q":"Đâu là đặc trưng của nhà nước pháp quyền:","options":{"A":"Tất cả các đáp án trên","B":"Sự ràng buộc của Nhà nước, cơ quan nhà nước, công chức nhà nước bởi pháp luật","C":"Xác định rõ trách nhiệm của nhà nước và công dân trên cơ sở pháp luật","D":"Sự thống trị của pháp luật trong mọi lĩnh vực của đời sống xã hội"},"answer":"A","page":3,"uid":"de1_cau15","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 15 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Tất cả các đáp án trên."},{"id":16,"q":"Nguồn sớm nhất hình thành pháp luật là:","options":{"A":"Tập quán pháp","B":"Tiền lệ pháp","C":"Văn bản pháp luật","D":"Các học thuyết chính trị - pháp lý"},"answer":"A","page":3,"uid":"de1_cau16","quiz":1,"category":"Hình thức và nguồn pháp luật","source":"Đề 1 · Câu 16 · Trang 3","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án A: Tập quán pháp."},{"id":17,"q":"Học thuyết pháp luật tự nhiên cho rằng:","options":{"A":"Cả 03 phương án trên đều đúng","B":"Pháp luật là hệ thống quy tắc của tự nhiên","C":"Pháp luật xuất phát từ cuộc sống tự nhiên hoang dã","D":"Pháp luật là tổng thể các quyền và nghĩa vụ của con người tự nhiên sinh ra đã có"},"answer":"D","page":3,"uid":"de1_cau17","quiz":1,"category":"Hình thức và nguồn pháp luật","source":"Đề 1 · Câu 17 · Trang 3","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án D: Pháp luật là tổng thể các quyền và nghĩa vụ của con người tự nhiên sinh ra đã có."},{"id":18,"q":"Các nguyên tắc của pháp luật là yếu tố quan trọng thuộc:","options":{"A":"Hình thức bên ngoài của pháp luật","B":"Cấu trúc của pháp luật","C":"Cả 03 phương án trên đều đúng","D":"Hình thức bên trong của pháp luật"},"answer":"D","page":3,"uid":"de1_cau18","quiz":1,"category":"Lý luận chung về pháp luật","source":"Đề 1 · Câu 18 · Trang 3","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án D: Hình thức bên trong của pháp luật."},{"id":19,"q":"Việc tòa án thường đưa các vụ án đi xét xử lưu động thể hiện chủ yếu chức năng nào của pháp luật:","options":{"A":"Chức năng giáo dục pháp luật","B":"Chức năng bảo vệ các QHXH","C":"Cả 3 đáp án kia đều sai","D":"Chức năng điều chỉnh các QHXH"},"answer":"A","page":3,"uid":"de1_cau19","quiz":1,"category":"Nhà nước","source":"Đề 1 · Câu 19 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Chức năng giáo dục pháp luật."},{"id":20,"q":"\"Nội dung của pháp luật phải được quy định rõ ràng, chặt chẽ trong các văn bản pháp luật\" là biểu hiện thuộc tính nào của pháp luật:","options":{"A":"Tính quy phạm phổ biến","B":"Tính xác định chặt chẽ về mặt hình thức","C":"Tính cưỡng chế nhà nước","D":"Tính bắt buộc chung"},"answer":"B","page":3,"uid":"de1_cau20","quiz":1,"category":"Hình thức và nguồn pháp luật","source":"Đề 1 · Câu 20 · Trang 3","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án B: Tính xác định chặt chẽ về mặt hình thức."},{"id":21,"q":"Trong HTPL Việt Nam, để được coi là một ngành luật độc lập khi:","options":{"A":"Ngành luật đó phải có đối tượng điều chỉnh và phương pháp điều chỉnh","B":"Ngành luật đó phải có đối tượng điều chỉnh","C":"Ngành luật đó phải có phương pháp điều chỉnh","D":"Ngành luật đó phải có đầy đủ các VBQPPL"},"answer":"A","page":3,"uid":"de1_cau21","quiz":1,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 1 · Câu 21 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Ngành luật đó phải có đối tượng điều chỉnh và phương pháp điều chỉnh."},{"id":22,"q":"Hội đồng nhân dân các cấp có quyền ban hành loại văn bản QPPL nào:","options":{"A":"Nghị quyết, quyết định","B":"Nghị quyết, nghị định","C":"Nghị quyết","D":"Nghị định"},"answer":"C","page":3,"uid":"de1_cau22","quiz":1,"category":"Hình thức và nguồn pháp luật","source":"Đề 1 · Câu 22 · Trang 3","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án C: Nghị quyết."},{"id":23,"q":"Văn bản quy phạm pháp luật được áp dụng từ thời điểm nào:","options":{"A":"Thời điểm ký ban hành","B":"Bắt đầu có hiệu lực","C":"Thời điểm thông qua","D":"Thời điểm đăng công báo"},"answer":"B","page":4,"uid":"de1_cau23","quiz":1,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 1 · Câu 23 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án B: Bắt đầu có hiệu lực."},{"id":24,"q":"Bộ phận \"giả định\" có ý nghĩa như thế nào trong quy phạm pháp luật:","options":{"A":"Xác định biện pháp xử lý đối với chủ thể vi phạm pháp luật","B":"Xác định chủ thể, điều kiện, hoàn cảnh, tình huống chịu sự tác động của QPPL","C":"Xác định cách xử sự của các chủ thể pháp luật khi tham gia vào quan hệ xã hội","D":"Tuỳ từng trường hợp mà có một trong các ý nghĩa nêu trên"},"answer":"B","page":4,"uid":"de1_cau24","quiz":1,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 1 · Câu 24 · Trang 4","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án B: Xác định chủ thể, điều kiện, hoàn cảnh, tình huống chịu sự tác động của QPPL."},{"id":25,"q":"Quy phạm pháp luật bao gồm những loại nào:","options":{"A":"Chỉ có một loại là \"quy phạm cấm đoán\"","B":"Chỉ có một loại là \"quy phạm bắt buộc\"","C":"Có thể bao gồm tất cả các loại quy phạm nêu trên","D":"Chỉ có một loại là \"quy phạm lựa chọn\""},"answer":"C","page":4,"uid":"de1_cau25","quiz":1,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 1 · Câu 25 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Có thể bao gồm tất cả các loại quy phạm nêu trên."},{"id":26,"q":"Quy phạm \"Công dân được quyền tự do kinh doanh theo quy định của pháp luật\" gồm những bộ phận nào:","options":{"A":"Giả định, quy định, chế tài","B":"Giả định, chế tài","C":"Quy định, chế tài","D":"Giả định, quy định"},"answer":"D","page":4,"uid":"de1_cau26","quiz":1,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 1 · Câu 26 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Giả định, quy định."},{"id":27,"q":"Chủ thể của quan hệ pháp luật là:","options":{"A":"Bất kỳ pháp nhân nào","B":"Các cá nhân, pháp nhân có đầy đủ năng lực chủ thể","C":"Bất kỳ cá nhân nào","D":"Tất cả các cá nhân, pháp nhân tham gia vào quan hệ pháp luật"},"answer":"B","page":4,"uid":"de1_cau27","quiz":1,"category":"Luật dân sự","source":"Đề 1 · Câu 27 · Trang 4","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án B: Các cá nhân, pháp nhân có đầy đủ năng lực chủ thể."},{"id":28,"q":"Nhận định nào dưới đây là sai:","options":{"A":"Năng lực pháp luật của tổ chức xuất hiện khi tổ chức đó được thành lập","B":"Năng lực pháp luật của mọi cá nhân là như nhau","C":"Năng lực pháp luật của mọi tổ chức là như nhau","D":"Năng lực pháp luật của cá nhân xuất hiện khi cá nhân đó sinh ra, mất đi khi cá nhân đó chết"},"answer":"C","page":4,"uid":"de1_cau28","quiz":1,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 1 · Câu 28 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Năng lực pháp luật của mọi tổ chức là như nhau."},{"id":29,"q":"Đội mũ bảo hiểm khi tham gia giao thông bằng xe gắn máy chính là chủ thể đang thực hiện pháp luật dưới hình thức nào:","options":{"A":"Tuân thủ pháp luật","B":"Sử dụng pháp luật","C":"Áp dụng pháp luật","D":"Thi hành (chấp hành) pháp luật"},"answer":"D","page":4,"uid":"de1_cau29","quiz":1,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 1 · Câu 29 · Trang 4","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án D: Thi hành (chấp hành) pháp luật."},{"id":30,"q":"Hành vi trái pháp luật thực hiện trong trường hợp nào sau đây thì không bị coi là có lỗi:","options":{"A":"Phòng vệ chính đáng","B":"Tình thế cấp thiết","C":"Sự kiện bất ngờ","D":"Tất cả các trường hợp trên"},"answer":"C","page":5,"uid":"de1_cau30","quiz":1,"category":"Lý luận chung về pháp luật","source":"Đề 1 · Câu 30 · Trang 5","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án C: Sự kiện bất ngờ."},{"id":31,"q":"Chủ thể không thấy trước hành vi của mình có thể gây ra hậu quả nguy hại cho xã hội, mặc dù phải thấy trước và có thể thấy trước hậu quả đó thì:","options":{"A":"Chủ thể có lỗi vô ý do cẩu thả","B":"Chủ thể không có lỗi vì không nhận thức được hậu quả","C":"Chủ thể có lỗi vô ý do quá tự tin","D":"Chủ thể có lỗi cố ý gián tiếp"},"answer":"A","page":5,"uid":"de1_cau31","quiz":1,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 1 · Câu 31 · Trang 5","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án A: Chủ thể có lỗi vô ý do cẩu thả."},{"id":32,"q":"Khái niệm \"trách nhiệm pháp lý\" được hiểu như thế nào:","options":{"A":"Là quan hệ pháp luật đặc biệt phát sinh giữa Nhà nước và chủ thể vi phạm pháp luật trong việc nhà nước áp dụng chế tài đối với chủ thể vi phạm pháp luật","B":"Là quan hệ pháp luật đặc biệt phát sinh giữa các chủ thể vi phạm pháp luật với nhau","C":"Là quan hệ pháp luật đặc biệt phát sinh giữa cơ quan nhà nước có thẩm quyền với nhau trong việc giải quyết vi phạm pháp luật","D":"Là quan hệ pháp luật đặc biệt phát sinh giữa Nhà nước và các chủ thể pháp luật"},"answer":"A","page":5,"uid":"de1_cau32","quiz":1,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 1 · Câu 32 · Trang 5","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án A: Là quan hệ pháp luật đặc biệt phát sinh giữa Nhà nước và chủ thể vi phạm pháp luật trong việc nhà nước áp dụng chế tài đối với chủ thể vi phạm pháp luật."},{"id":33,"q":"Quyết định xử phạt đối với anh A điều khiển xe máy vượt đèn đỏ là trách nhiệm pháp lý gì:","options":{"A":"Trách nhiệm hành chính","B":"Trách nhiệm dân sự","C":"Trách nhiệm kỷ luật","D":"Trách nhiệm hình sự"},"answer":"A","page":5,"uid":"de1_cau33","quiz":1,"category":"Luật hình sự","source":"Đề 1 · Câu 33 · Trang 5","hint":"Nhớ dấu hiệu tội phạm, hình phạt và trách nhiệm hình sự.","explanation":"Đáp án A: Trách nhiệm hành chính."},{"id":34,"q":"Các hệ thống pháp luật phổ biến trên thế giới được phân loại thành:","options":{"A":"05 nhóm","B":"03 nhóm","C":"02 nhóm","D":"04 nhóm"},"answer":"D","page":5,"uid":"de1_cau34","quiz":1,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 1 · Câu 34 · Trang 5","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Theo slide Chương 4, sơ đồ hệ thống pháp luật trên thế giới thể hiện 4 nhóm."},{"id":35,"q":"Tư cách pháp nhân để chỉ:","options":{"A":"Tư cách chủ thể pháp luật của tổ chức","B":"Tư cách chủ thể pháp luật của cá nhân, tổ chức","C":"Tư cách chủ thể pháp luật của cá nhân","D":"Tất cả các đáp án trên đều sai"},"answer":"A","page":5,"uid":"de1_cau35","quiz":1,"category":"Luật dân sự","source":"Đề 1 · Câu 35 · Trang 5","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án A: Tư cách chủ thể pháp luật của tổ chức."},{"id":36,"q":"Quyền sở hữu trí tuệ gồm:","options":{"A":"Quyền tác giả và quyền liên quan đến quyền tác giả","B":"Tất cả các đáp án trên","C":"Quyền sở hữu công nghiệp","D":"Quyền đối với giống cây trồng"},"answer":"B","page":5,"uid":"de1_cau36","quiz":1,"category":"Sở hữu trí tuệ","source":"Đề 1 · Câu 36 · Trang 5","hint":"Phân biệt rõ sáng chế, kiểu dáng, nhãn hiệu và quyền tác giả.","explanation":"Đáp án B: Tất cả các đáp án trên."},{"id":37,"q":"Quyền tác giả là quyền của cá nhân,.... đối với tác phẩm do mình sáng tạo ra hoặc:","options":{"A":"Pháp nhân, sở hữu","B":"Tổ chức, sở hữu","C":"Pháp nhân, sử dụng","D":"Tổ chức, sử dụng"},"answer":"B","page":5,"uid":"de1_cau37","quiz":1,"category":"Sở hữu trí tuệ","source":"Đề 1 · Câu 37 · Trang 5","hint":"Phân biệt rõ sáng chế, kiểu dáng, nhãn hiệu và quyền tác giả.","explanation":"Đáp án B: Tổ chức, sở hữu."},{"id":38,"q":"Sáng chế là:","options":{"A":"Là dấu hiệu để phân biệt hàng hóa dịch vụ của các cá nhân, tổ chức khác nhau","B":"Là giải pháp kỹ thuật dưới dạng sản phẩm hoặc quy trình nhằm giải quyết một vấn đề xác định","C":"Là hình dáng bên ngoài của sản phẩm được thể hiện bằng hình khối, đường nét, màu sắc","D":"Tên gọi của cá nhân, tổ chức dùng trong hoạt động kinh doanh để phân biệt các chủ thể kinh doanh trong cùng lĩnh vực hoặc khu vực"},"answer":"B","page":6,"uid":"de1_cau38","quiz":1,"category":"Sở hữu trí tuệ","source":"Đề 1 · Câu 38 · Trang 6","hint":"Phân biệt rõ sáng chế, kiểu dáng, nhãn hiệu và quyền tác giả.","explanation":"Đáp án B: Là giải pháp kỹ thuật dưới dạng sản phẩm hoặc quy trình nhằm giải quyết một vấn đề xác định."},{"id":39,"q":"Đối tượng điều chỉnh của ngành luật lao động là:","options":{"A":"Cả quan hệ lao động và quan hệ phát sinh trong quá trình sử dụng lao động","B":"Quan hệ phát sinh trong quá trình sử dụng lao động","C":"Quan hệ lao động","D":"Các quan hệ phát sinh giữa nhà nước với người phạm tội"},"answer":"A","page":6,"uid":"de1_cau39","quiz":1,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 1 · Câu 39 · Trang 6","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Cả quan hệ lao động và quan hệ phát sinh trong quá trình sử dụng lao động."},{"id":40,"q":"Đối tượng điều chỉnh của Luật hình sự Việt Nam là:","options":{"A":"Quan hệ xã hội phát sinh giữa các cơ quan tố tụng và người phạm tội","B":"Quan hệ xã hội phát sinh giữa người thực hiện hành vi phạm tội với nạn nhân","C":"Quan hệ xã hội phát sinh giữa các cơ quan tố tụng với nhau trong quá trình giải quyết vụ việc hình sự","D":"Quan hệ xã hội phát sinh giữa các cơ quan tiến hành tố tụng với nạn nhân"},"answer":"A","page":6,"uid":"de1_cau40","quiz":1,"category":"Lý luận chung về pháp luật","source":"Đề 1 · Câu 40 · Trang 6","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án A: Quan hệ xã hội phát sinh giữa các cơ quan tố tụng và người phạm tội."},{"id":41,"q":"Phát biểu nào về Tội phạm là đúng nhất:","options":{"A":"Tội phạm là những hành vi nguy hiểm gây ra hậu quả lớn cho xã hội Nhà nước cần phải nghiêm trị","B":"Tội phạm là những hành vi nguy hiểm cho xã hội cần phải trừng trị bởi yêu cầu của xã hội","C":"Tội phạm là những hành vi nguy hiểm cho xã hội được quy định trong bộ luật hình sự","D":"Tội phạm là những hành vi nguy hiểm cho xã hội do tòa án tuyên"},"answer":"C","page":6,"uid":"de1_cau41","quiz":1,"category":"Luật hình sự","source":"Đề 1 · Câu 41 · Trang 6","hint":"Nhớ dấu hiệu tội phạm, hình phạt và trách nhiệm hình sự.","explanation":"Đáp án C: Tội phạm là những hành vi nguy hiểm cho xã hội được quy định trong bộ luật hình sự."},{"id":42,"q":"Đối tượng điều chỉnh của pháp luật dân sự là:","options":{"A":"Chế độ chính trị, kinh tế, xã hội","B":"Tội phạm và hình phạt","C":"Quan hệ tài sản và quan hệ nhân thân","D":"Bộ máy nhà nước"},"answer":"C","page":6,"uid":"de1_cau42","quiz":1,"category":"Luật dân sự","source":"Đề 1 · Câu 42 · Trang 6","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án C: Quan hệ tài sản và quan hệ nhân thân."}],"count":42},"2":{"id":2,"title":"Đề 2","questions":[{"id":1,"q":"Pháp luật đại cương nghiên cứu những vấn đề cơ bản về cái gì?","options":{"A":"Pháp Luật","B":"Nhà nước","C":"Kinh tế chính trị pháp luật","D":"Nhà nước và pháp luật"},"answer":"D","page":1,"uid":"de2_cau1","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 1 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Nhà nước và pháp luật."},{"id":2,"q":"Nội dung của môn học pháp luật đại cương?","options":{"A":"Các ngành luật chính trong hệ thống pháp luật Việt Nam","B":"Các hệ thống pháp luật trên thế giới","C":"Những vấn đề cơ bản... về nhà nước và pháp luật","D":"Cả ba đáp án trên"},"answer":"D","page":1,"uid":"de2_cau2","quiz":2,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 2 · Câu 2 · Trang 1","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Cả ba đáp án trên."},{"id":3,"q":"Pháp luật đại cương là ngành khoa học thuộc:","options":{"A":"Khoa học kỹ thuật","B":"Khoa học xã hội","C":"Khoa học chính trị","D":"Khoa học pháp lý"},"answer":"D","page":1,"uid":"de2_cau3","quiz":2,"category":"Lý luận chung về pháp luật","source":"Đề 2 · Câu 3 · Trang 1","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án D: Khoa học pháp lý."},{"id":4,"q":"Mối quan hệ giữa nhà nước và pháp luật là?","options":{"A":"Quan hệ một chiều","B":"Quan hệ qua lại ràng buộc tác động lẫn nhau","C":"Không có quan hệ gì","D":"Quan hệ phụ thuộc"},"answer":"B","page":1,"uid":"de2_cau4","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 4 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Quan hệ qua lại ràng buộc tác động lẫn nhau."},{"id":5,"q":"Bản chất của nhà nước bao gồm:","options":{"A":"Bản chất giai cấp, bản chất xã hội và bản chất kinh tế","B":"Bản chất giai cấp","C":"Bản chất xã hội","D":"Bản chất giai cấp và bản chất xã hội"},"answer":"D","page":1,"uid":"de2_cau5","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 5 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Bản chất giai cấp và bản chất xã hội."},{"id":6,"q":"Nhà nước mang bản chất giai cấp có nghĩa là:","options":{"A":"Nhà nước thuộc về một giai cấp hoặc một liên minh giai cấp nhất định trong xã hội","B":"Nhà nước chỉ thuộc về một cơ quan quyền lực tối cao trong xã hội","C":"Nhà nước chỉ thuộc về giai cấp bị trị","D":"Không có đáp án đúng"},"answer":"A","page":1,"uid":"de2_cau6","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 6 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Nhà nước thuộc về một giai cấp hoặc một liên minh giai cấp nhất định trong xã hội."},{"id":7,"q":"Một trong những bản chất của nhà nước là:","options":{"A":"Tính xã hội","B":"Nhà nước đặt ra thuế và thu thuế dưới hình thức bắt buộc","C":"Nhà nước có chủ quyền duy nhất","D":"Tất cả đáp án đều đúng"},"answer":"A","page":2,"uid":"de2_cau7","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 7 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Tính xã hội."},{"id":8,"q":"Thông qua nhà nước giai cấp thống trị nắm giữ trong tay những loại quyền lực nào?","options":{"A":"Cả A và C","B":"Quyền lực tinh thần","C":"Quyền lực kinh tế, quyền lực chính trị","D":"Quyền lực kinh tế, quyền lực chính trị, quyền lực tư tưởng"},"answer":"D","page":2,"uid":"de2_cau8","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 8 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Quyền lực kinh tế, quyền lực chính trị, quyền lực tư tưởng."},{"id":9,"q":"Quyền lực nào tạo ra sự lệ thuộc cơ bản giữa giai cấp bị trị với giai cấp thống trị?","options":{"A":"Cả ba đáp án đều đúng","B":"Quyền lực kinh tế","C":"Quyền lực tư tưởng","D":"Quyền lực chính trị"},"answer":"B","page":2,"uid":"de2_cau9","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 9 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Quyền lực kinh tế."},{"id":10,"q":"Quyền lực tư tưởng nghĩa là gì?","options":{"A":"Giai cấp bị thống trị thông qua nhà nước để xây dựng hệ tư tưởng của mình trở thành hệ tư tưởng thống trị trong xã hội","B":"Giai cấp thống trị thông qua pháp luật để xây dựng hệ tư tưởng của mình trở thành hệ tư tưởng thống trị trong xã hội","C":"Giai cấp thống trị thông qua nhà nước để xây dựng hệ tư tưởng của mình trở thành hệ tư tưởng thống trị trong xã hội","D":"Giai cấp thống trị thông qua nhà nước và pháp luật để xây dựng hệ tư tưởng của mình trở thành hệ tư tưởng thống trị trong xã hội"},"answer":"C","page":2,"uid":"de2_cau10","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 10 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Giai cấp thống trị thông qua nhà nước để xây dựng hệ tư tưởng của mình trở thành hệ tư tưởng thống trị trong xã hội."},{"id":11,"q":"Tính giai cấp của nhà nước thể hiện:","options":{"A":"Nhà nước là bộ máy thống trị của giai cấp này đối với giai cấp khác","B":"Nhà nước là bộ máy trấn áp giai cấp","C":"Nhà nước là sản phẩm của xã hội có giai cấp","D":"Cả ba đáp án trên"},"answer":"D","page":2,"uid":"de2_cau11","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 11 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Theo slide, tính giai cấp thể hiện đồng thời ở nguồn gốc giai cấp, sự thống trị và chức năng trấn áp."},{"id":12,"q":"Nhà nước là sản phẩm và biểu hiện của những mâu thuẫn... không thể điều hòa được?","options":{"A":"xã hội","B":"dân tộc","C":"dân tộc và giai cấp","D":"giai cấp"},"answer":"D","page":2,"uid":"de2_cau12","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 12 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: giai cấp."},{"id":13,"q":"Nhà nước là bộ máy duy trì sự thống trị của giai cấp này đối với giai cấp khác thể hiện bản chất gì của nhà nước?","options":{"A":"Tính quyền lực","B":"Tính xã hội","C":"Tính giai cấp","D":"Tính đàn áp"},"answer":"C","page":2,"uid":"de2_cau13","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 13 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Tính giai cấp."},{"id":14,"q":"Nội dung nào không là cơ sở cho tính giai cấp của nhà nước?","options":{"A":"Nhà nước có quyền lực công cộng đặc biệt và tách rời ra khỏi xã hội","B":"Nhà nước là tổ chức điều hòa những mâu thuẫn giai cấp","C":"Giai cấp là nguyên nhân ra đời của nhà nước","D":"Nhà nước là bộ máy trấn áp giai cấp"},"answer":"B","page":2,"uid":"de2_cau14","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 14 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Nhà nước là tổ chức điều hòa những mâu thuẫn giai cấp."},{"id":15,"q":"Nhà nước có bản chất xã hội vì:","options":{"A":"Nhà nước xuất hiện bởi nhu cầu bảo vệ lợi ích chung của xã hội khi nó trùng với lợi ích của giai cấp thống trị","B":"Nhà nước xuất hiện bởi nhu cầu quản lý xã hội","C":"Nhà nước xuất hiện bởi nhu cầu trấn áp giai cấp để giữ trật tự xã hội","D":"Do nhu cầu thay đổi kiểu nhà nước"},"answer":"B","page":3,"uid":"de2_cau15","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 15 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Nhà nước xuất hiện bởi nhu cầu quản lý xã hội."},{"id":16,"q":"Mối quan hệ giữa tính giai cấp và tính xã hội trong bản chất của nhà nước là:","options":{"A":"Tính giai cấp luôn là mặt chủ yếu quyết định tính xã hội","B":"Mâu thuẫn giữa tính giai cấp và tính xã hội","C":"Thống nhất giữa tính giai cấp và tính xã hội","D":"Là hai mặt trong một thể thống nhất"},"answer":"D","page":3,"uid":"de2_cau16","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 16 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Là hai mặt trong một thể thống nhất."},{"id":17,"q":"Bản chất xã hội của nhà nước thể hiện qua việc:","options":{"A":"Bảo vệ và thể hiện ý chí lợi ích chung của xã hội","B":"Bảo vệ lợi ích của giai cấp","C":"Không bảo vệ những lợi ích khác nhau trong xã hội","D":"Bảo vệ trật tự của nhà nước"},"answer":"A","page":3,"uid":"de2_cau17","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 17 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Bảo vệ và thể hiện ý chí lợi ích chung của xã hội."},{"id":18,"q":"Khẳng định nào sau đây là đúng?","options":{"A":"Bất cứ nhà nước nào cũng đều thể hiện bản chất giai cấp và bản chất xã hội","B":"Bất cứ nhà nước nào cũng thể hiện bản chất giai cấp rõ nét hơn bản chất xã hội","C":"Bất cứ nhà nước nào cũng thể hiện bản chất xã hội rõ nét hơn bản chất giai cấp","D":"Bất cứ nhà nước nào cũng chỉ là bộ máy duy trì sự thống trị của giai cấp này đối với giai cấp khác"},"answer":"A","page":3,"uid":"de2_cau18","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 18 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Bất cứ nhà nước nào cũng đều thể hiện bản chất giai cấp và bản chất xã hội."},{"id":19,"q":"Lịch sử xã hội loài người trải qua mấy kiểu nhà nước?","options":{"A":"2","B":"3","C":"4","D":"1"},"answer":"C","page":3,"uid":"de2_cau19","quiz":2,"category":"Phòng, chống tham nhũng","source":"Đề 2 · Câu 19 · Trang 3","hint":"Chú ý chủ thể có chức vụ, quyền hạn và mục đích vụ lợi.","explanation":"Đáp án C: 4."},{"id":20,"q":"Giai cấp thống trị trong nhà nước phong kiến là giai cấp nào?","options":{"A":"Tư bản","B":"Địa chủ","C":"Tăng lữ","D":"Nông dân"},"answer":"B","page":3,"uid":"de2_cau20","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 20 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Địa chủ."},{"id":21,"q":"Nhà nước phong kiến củng cố và bảo vệ quyền lợi gì của giai cấp phong kiến?","options":{"A":"Chiếm hữu nhà ở","B":"Chiếm hữu ruộng đất","C":"Chiếm hữu máy móc sản xuất","D":"Chiếm hữu nô lệ"},"answer":"B","page":3,"uid":"de2_cau21","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 21 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Chiếm hữu ruộng đất."},{"id":22,"q":"Hình thức chính thể phổ biến của nhà nước phong kiến là hình thức gì?","options":{"A":"Tư bản","B":"Xã hội chủ nghĩa","C":"Quân chủ lập hiến","D":"Quân chủ"},"answer":"D","page":4,"uid":"de2_cau22","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 22 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Quân chủ."},{"id":23,"q":"Nhà nước phong kiến Việt Nam ghi nhận những tư tưởng của tôn giáo nào?","options":{"A":"Thiên chúa giáo","B":"Phật giáo","C":"Nho giáo","D":"Cả Phật giáo và Nho giáo"},"answer":"D","page":4,"uid":"de2_cau23","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 23 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Phật giáo và Nho giáo đều từng có ảnh hưởng lớn trong các giai đoạn phong kiến Việt Nam."},{"id":24,"q":"Pháp luật là một hiện tượng:","options":{"A":"Chỉ mang tính xã hội không mang tính giai cấp","B":"Chỉ mang tính giai cấp không mang tính xã hội","C":"Cả ba đáp án trên đều sai","D":"Vừa mang tính xã hội vừa mang tính giai cấp"},"answer":"D","page":4,"uid":"de2_cau24","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 24 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Vừa mang tính xã hội vừa mang tính giai cấp."},{"id":25,"q":"Pháp luật thể hiện ý chí của giai cấp thống trị là:","options":{"A":"Thuộc tính cơ bản của pháp luật","B":"Nguồn của pháp luật","C":"Bản chất xã hội của pháp luật","D":"Bản chất giai cấp của pháp luật"},"answer":"D","page":4,"uid":"de2_cau25","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 25 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Bản chất giai cấp của pháp luật."},{"id":26,"q":"Tính giai cấp của pháp luật thể hiện ở nhận định nào?","options":{"A":"Pháp luật là ý chí của giai cấp thống trị","B":"Cả ba đáp án trên","C":"Pháp luật là sản phẩm của xã hội có giai cấp","D":"Pháp luật là công cụ điều chỉnh các mối quan hệ giai cấp"},"answer":"B","page":4,"uid":"de2_cau26","quiz":2,"category":"Nhà nước","source":"Đề 2 · Câu 26 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Cả ba đáp án trên."},{"id":27,"q":"Pháp luật mang bản chất xã hội vì:","options":{"A":"Phù hợp với ý chí của giai cấp cầm quyền","B":"Phù hợp với ý chí của giai er":"B","page":5,"uid":"de2_cau35","quiz":2,"category":"Lý luận chung về pháp luật","source":"Đề 2 · Câu 35 · Trang 5","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án B: Pháp luật tác động tới ý thức và tâm lý của con người."}],"count":35},"3":{"id":3,"title":"Đề 3","questions":[{"id":1,"q":"Nhà nước quân chủ hạn chế (quân chủ lập hiến) là nhà nước như thế nào?","options":{"A":"Quyền lực nhà nước tối cao thuộc về một tập thể do bầu cử mà ra","B":"Quyền lực nhà nước được chia làm hai một phần thuộc về nhà vua hoặc nữ hoàng theo phương thức thừa kế, một phần thuộc về cơ quan nhà nước khác do bầu cử.","C":"Quyền lực nhà nước tối cao thuộc về một tập thể và được hình thành theo phương thức thừa kế","D":"Không có phương án nào đúng"},"answer":"B","page":1,"uid":"de3_cau1","quiz":3,"category":"Luật dân sự","source":"Đề 3 · Câu 1 · Trang 1","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án B: Quyền lực nhà nước được chia làm hai một phần thuộc về nhà vua hoặc nữ hoàng theo phương thức thừa kế, một phần thuộc về cơ quan nhà nước khác do bầu cử.."},{"id":2,"q":"Trong nhà nước quân chủ chuyên chế thì:","options":{"A":"Quyền lực nhà nước tối cao thuộc về một tập thể và được hình thành theo phương thức thừa kế","B":"Quyền lực nhà nước tối cao thuộc về một tập thể do bầu cử mà ra","C":"Quyền lực tối cao thuộc về một người do bầu cử mà ra","D":"Quyền lực tối cao thuộc về một người và được hình thành theo phương thức thừa kế"},"answer":"D","page":1,"uid":"de3_cau2","quiz":3,"category":"Luật dân sự","source":"Đề 3 · Câu 2 · Trang 1","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án D: Quyền lực tối cao thuộc về một người và được hình thành theo phương thức thừa kế."},{"id":3,"q":"Chế độ chính trị của nhà nước Việt Nam:","options":{"A":"Dân chủ quý tộc","B":"Dân chủ xã hội chủ nghĩa","C":"Dân chủ tư sản","D":"Dân chủ chủ nô"},"answer":
