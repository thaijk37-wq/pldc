chính thể cộng hòa lưỡng tính","B":"Hình thức chính thể cộng hòa nghị viện","C":"Hình thức chính thể cộng hòa tổng thống","D":"Hình thức chính thể quân chủ đại nghị"},"answer":"B","page":2,"uid":"de3_cau8","quiz":3,"category":"Nhà nước","source":"Đề 3 · Câu 8 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Hình thức chính thể cộng hòa nghị viện."},{"id":9,"q":"Hình thức cấu trúc nhà nước bao gồm những loại nào?","options":{"A":"Nhà nước đơn nhất và nhà nước liên bang","B":"Chỉ có nhà nước đơn nhất","C":"Nhà nước đơn nhất, nhà nước liên bang và liên minh các nhà nước","D":"Chỉ có nhà nước liên bang"},"answer":"C","page":2,"uid":"de3_cau9","quiz":3,"category":"Nhà nước","source":"Đề 3 · Câu 9 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Nhà nước đơn nhất, nhà nước liên bang và liên minh các nhà nước."},{"id":10,"q":"Nhà nước đơn nhất là nhà nước như thế nào?","options":{"A":"Không có phương án nào đúng","B":"Là nhà nước có chủ quyền chung, có lãnh thổ toàn vẹn; có một hệ thống các cơ quan nhà nước thống nhất từ trung ương đến địa phương; có một hệ thống pháp luật thống nhất trên toàn vẹn lãnh thổ quốc gia","C":"Là nhà nước có chủ quyền chung, có lãnh thổ toàn vẹn, thống nhất; có một hệ thống các cơ quan nhà nước thống nhất từ trung ương đến địa phương; có một hệ thống pháp luật thống nhất trên toàn vẹn lãnh thổ quốc gia","D":"Là nhà nước có chủ quyền riêng, có lãnh thổ toàn vẹn, thống nhất; có một hệ thống các cơ quan nhà nước thống nhất từ trung ương đến địa phương; có một hệ thống pháp luật thống nhất trên toàn vẹn lãnh thổ quốc gia"},"answer":"B","page":2,"uid":"de3_cau10","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 10 · Trang 2","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án B: Là nhà nước có chủ quyền chung, có lãnh thổ toàn vẹn; có một hệ thống các cơ quan nhà nước thống nhất từ trung ương đến địa phương; có một hệ thống pháp luật thống nhất trên toàn vẹn lãnh thổ quốc gia."},{"id":11,"q":"Nhà nước liên bang là nhà nước như thế nào?","options":{"A":"Là nhà nước được thiết lập từ hai hay nhiều nhà nước thành viên.","B":"Là nhà nước được thiết lập từ hai hay nhiều vùng lãnh thổ.","C":"Là nhà nước được thiết lập từ ba hay nhiều nhà nước thành viên.","D":"Là nhà nước được thiết lập từ hai hay nhiều vùng lãnh thổ gần nhau."},"answer":"A","page":2,"uid":"de3_cau11","quiz":3,"category":"Nhà nước","source":"Đề 3 · Câu 11 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Là nhà nước được thiết lập từ hai hay nhiều nhà nước thành viên.."},{"id":12,"q":"Chế độ chính trị được hiểu là gì?","options":{"A":"Là tổng thể các phương pháp để thực hiện quyền lực nhà nước","B":"Là tất cả các thiết chế chính trị trong xã hội","C":"Tất cả đều đúng","D":"Là toàn bộ đường lối chính sách mà đảng chính trị cầm quyền đề ra"},"answer":"A","page":2,"uid":"de3_cau12","quiz":3,"category":"Nhà nước","source":"Đề 3 · Câu 12 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Là tổng thể các phương pháp để thực hiện quyền lực nhà nước."},{"id":13,"q":"Quan hệ xã hội muốn trở thành quan hệ pháp luật cần có điều kiện gì?","options":{"A":"Có sự kiện pháp lý","B":"Có quy phạm pháp luật điều chỉnh","C":"Phải có đủ ba điều kiện trên","D":"Có chủ thể tham gia quan hệ pháp luật và chủ thể đó có đủ năng lực chủ thể"},"answer":"C","page":3,"uid":"de3_cau13","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 13 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Phải có đủ ba điều kiện trên."},{"id":14,"q":"Các yếu tố của quan hệ pháp luật gồm:","options":{"A":"Chủ thể, khách thể của quan hệ pháp luật","B":"Nội dung của quan hệ pháp luật","C":"Sự kiện pháp lý","D":"Cả Chủ thể, khách thể và nội dung của quan hệ pháp luật"},"answer":"D","page":3,"uid":"de3_cau14","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 14 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Cả Chủ thể, khách thể và nội dung của quan hệ pháp luật."},{"id":15,"q":"Nhận định nào sau đây là đúng:","options":{"A":"Quan hệ pháp luật luôn phản ánh ý chí của nhà nước","B":"Tất cả các nhận định trên đều đúng","C":"Quan hệ pháp luật luôn phản ánh ý chí của các bên tham gia quan hệ","D":"Quan hệ pháp luật được đảm bảo bằng sức mạnh cưỡng chế của nhà nước"},"answer":"B","page":3,"uid":"de3_cau15","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 15 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án B: Tất cả các nhận định trên đều đúng."},{"id":16,"q":"Chủ thể của quan hệ pháp luật là:","options":{"A":"Bất kỳ cá nhân nào","B":"Tất cả các cá nhân, tổ chức tham gia vào quan hệ pháp luật","C":"Mọi tổ chức","D":"Các cá nhân, tổ chức có đủ năng lực chủ thể theo quy định của pháp luật tham gia vào quan hệ pháp luật"},"answer":"D","page":3,"uid":"de3_cau16","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 16 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Các cá nhân, tổ chức có đủ năng lực chủ thể theo quy định của pháp luật tham gia vào quan hệ pháp luật."},{"id":17,"q":"Nhận định nào dưới đây là sai:","options":{"A":"Năng lực pháp luật của mọi tổ chức là như nhau","B":"Năng lực pháp luật của tổ chức xuất hiện khi tổ chức đó được thành lập","C":"Năng lực pháp luật của cá nhân là như nhau","D":"Năng lực pháp luật của cá nhân xuất hiện khi cá nhân đó sinh ra và mất đi khi cá nhân đó chết"},"answer":"A","page":3,"uid":"de3_cau17","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 17 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Năng lực pháp luật của mọi tổ chức là như nhau."},{"id":18,"q":"Năng lực chủ thể gồm những loại năng lực nào?","options":{"A":"Năng lực pháp luật và năng lực hành vi","B":"Năng lực pháp luật","C":"Năng lực hành vi","D":"Năng lực pháp luật và năng lực hành chính"},"answer":"A","page":3,"uid":"de3_cau18","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 18 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Năng lực pháp luật và năng lực hành vi."},{"id":19,"q":"Năng lực chủ thể được hiểu là:","options":{"A":"Khả năng chủ thể có các quyền và nghĩa vụ pháp lý do nhà nước thừa nhận","B":"Khả năng chủ thể có thể trở thành các bên tham gia vào các quan hệ pháp luật","C":"Khả năng chủ thể bằng hành vi của mình thực hiện trên thực tế các quyền và nghĩa vụ pháp lý","D":"Tất cả đều đúng"},"answer":"B","page":3,"uid":"de3_cau19","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 19 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án B: Khả năng chủ thể có thể trở thành các bên tham gia vào các quan hệ pháp luật."},{"id":20,"q":"Năng lực pháp luật là gì?","options":{"A":"Khả năng chủ thể có thể trở thành các bên tham gia vào các quan hệ pháp luật","B":"Khả năng chủ thể có các quyền và nghĩa vụ pháp lý do nhà nước thừa nhận","C":"Tất cả đều đúng","D":"Khả năng chủ thể bằng hành vi của mình thực hiện trên thực tế các quyền và nghĩa vụ pháp lý"},"answer":"B","page":4,"uid":"de3_cau20","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 20 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án B: Khả năng chủ thể có các quyền và nghĩa vụ pháp lý do nhà nước thừa nhận."},{"id":21,"q":"Năng lực hành vi được hiểu là:","options":{"A":"Khả năng chủ thể bằng hành vi của mình thực hiện trên thực tế các quyền và nghĩa vụ pháp lý","B":"Tất cả đều đúng","C":"Khả năng chủ thể có các quyền và nghĩa vụ pháp lý do nhà nước thừa nhận","D":"Khả năng chủ thể có thể trở thành các bên tham gia vào các quan hệ pháp luật"},"answer":"A","page":4,"uid":"de3_cau21","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 21 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Khả năng chủ thể bằng hành vi của mình thực hiện trên thực tế các quyền và nghĩa vụ pháp lý."},{"id":22,"q":"Nhận định nào dưới đây là đúng:","options":{"A":"Năng lực pháp luật luôn mang tính giai cấp","B":"Năng lực hành vi luôn mang tính giai cấp","C":"Năng lực pháp luật của mọi tổ chức là như nhau","D":"Năng lực pháp luật là điều kiện đủ, năng lực hành vi là điều kiện cần"},"answer":"A","page":4,"uid":"de3_cau22","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 22 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Năng lực pháp luật luôn mang tính giai cấp."},{"id":23,"q":"Chủ thể của quan hệ pháp luật là cá nhân bao gồm mấy loại:","options":{"A":"Tất cả các phương án trên","B":"Công dân Việt Nam","C":"Người không có quốc tịch sinh sống hoạt động trên lãnh thổ Việt Nam","D":"Người nước ngoài sinh sống hoạt động trên lãnh thổ Việt Nam"},"answer":"A","page":4,"uid":"de3_cau23","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 23 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Tất cả các phương án trên."},{"id":24,"q":"Năng lực hành vi của cá nhân phụ thuộc vào:","options":{"A":"Độ tuổi và khả năng hành vi","B":"Khả năng nhận thức","C":"Độ tuổi","D":"Độ tuổi và khả năng nhận thức"},"answer":"D","page":4,"uid":"de3_cau24","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 24 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Độ tuổi và khả năng nhận thức."},{"id":25,"q":"Có một anh A gây thương tích cho chị B nên tòa thụ lý và xét xử anh 10 năm. Xác định chủ thể của quan hệ pháp luật hình sự trong vụ án trên:","options":{"A":"Anh A với nhà nước và chị B","B":"Công dân A với chị B","C":"Tất cả các phương án trên đều sai","D":"Anh A với nhà nước"},"answer":"D","page":4,"uid":"de3_cau25","quiz":3,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 3 · Câu 25 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Anh A với nhà nước."},{"id":26,"q":"Một tội phạm có mức cao nhất của khung hình phạt là 12 năm tù. Tội phạm này được xếp vào loại nào dưới đây:","options":{"A":"Tội phạm rất nghiêm trọng","B":"Tội phạm đặc biệt nghiêm trọng","C":"Tội phạm nghiêm trọng","D":"Tội phạm ít nghiêm trọng"},"answer":"A","page":4,"uid":"de3_cau26","quiz":3,"category":"Luật hình sự","source":"Đề 3 · Câu 26 · Trang 4","hint":"Nhớ dấu hiệu tội phạm, hình phạt và trách nhiệm hình sự.","explanation":"Đáp án A: Tội phạm rất nghiêm trọng."},{"id":27,"q":"Chính phủ có quyền ban hành những loại VBPL nào:","options":{"A":"Pháp lệnh, nghị quyết","B":"Nghị quyết, nghị định","C":"Luật, pháp lệnh","D":"Nghị quyết, nghị định, quyết định"},"answer":"B","page":5,"uid":"de3_cau27","quiz":3,"category":"Hình thức và nguồn pháp luật","source":"Đề 3 · Câu 27 · Trang 5","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án B: Nghị quyết, nghị định."},{"id":28,"q":"Cơ sở nào làm phát sinh trách nhiệm pháp lý?","options":{"A":"Khi cơ quan có thẩm quyền tiến hành xem xét vụ việc vi phạm","B":"Khi có chủ thể pháp luật xuất hiện","C":"Khi có quy phạm pháp luật được ban hành","D":"Khi có hành vi vi phạm pháp luật và có quyết định áp dụng"},"answer":"D","page":5,"uid":"de3_cau28","quiz":3,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 3 · Câu 28 · Trang 5","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án D: Khi có hành vi vi phạm pháp luật và có quyết định áp dụng."},{"id":29,"q":"Nhà nước do ai lập ra?","options":{"A":"Do Thượng đế lập ra","B":"Do toàn dân thế giới lập ra","C":"Do giai cấp thống trị lập ra","D":"Do các giai cấp bị trị trong xã hội lập ra"},"answer":"C","page":5,"uid":"de3_cau29","quiz":3,"category":"Nhà nước","source":"Đề 3 · Câu 29 · Trang 5","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Do giai cấp thống trị lập ra."},{"id":30,"q":"Hình thức chính thể cộng hoà được hiểu như thế nào?","options":{"A":"Là hình thức chính thể mà quyền lực nhà nước được trao cho một người đứng đầu theo chế độ thừa kế","B":"Cả ba nhận định trên đều sai","C":"Là hình thức chính thể mà quyền lực nhà nước được trao cho một cơ quan được thành lập theo chế độ bầu cử","D":"Là hình thức chính thể mà quyền lực nhà nước được trao cho một cơ quan được thành lập theo chế độ bầu cử và bên cạnh cơ quan này còn có một người đứng đầu là vua hoặc nữ hoàng"},"answer":"C","page":5,"uid":"de3_cau30","quiz":3,"category":"Luật dân sự","source":"Đề 3 · Câu 30 · Trang 5","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án C: Là hình thức chính thể mà quyền lực nhà nước được trao cho một cơ quan được thành lập theo chế độ bầu cử."},{"id":31,"q":"Đối tượng điều chỉnh của luật dân sự là:","options":{"A":"Các quan hệ vật chất","B":"Các quan hệ tài sản","C":"Cả hai phương án: Các quan hệ tài sản và Các quan hệ nhân thân phi tài sản","D":"Các quan hệ nhân thân phi tài sản"},"answer":"C","page":5,"uid":"de3_cau31","quiz":3,"category":"Luật dân sự","source":"Đề 3 · Câu 31 · Trang 5","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án C: Cả hai phương án: Các quan hệ tài sản và Các quan hệ nhân thân phi tài sản."},{"id":32,"q":"Đối tượng điều chỉnh của ngành luật hình sự là gì?","options":{"A":"Là quan hệ xã hội giữa Nhà nước và chủ thể đã thực hiện tội phạm","B":"Là quan hệ giữa Viện kiểm sát nhân dân với người phạm tội","C":"Cả ba đáp án đều đúng","D":"Là quan hệ giữa người phạm tội với người bị hại"},"answer":"A","page":5,"uid":"de3_cau32","quiz":3,"category":"Luật hình sự","source":"Đề 3 · Câu 32 · Trang 5","hint":"Nhớ dấu hiệu tội phạm, hình phạt và trách nhiệm hình sự.","explanation":"Đáp án A: Là quan hệ xã hội giữa Nhà nước và chủ thể đã thực hiện tội phạm."},{"id":33,"q":"Hoạt động nào sau đây thuộc chức năng của viện kiểm sát nhân dân:","options":{"A":"Hoạt động truy tố người phạm tội ra trước tòa án","B":"Hoạt động xét xử kẻ phạm tội","C":"Hoạt động thi hành án","D":"Cả ba hoạt động trên đều thuộc chức năng của viện kiểm sát nhân dân"},"answer":"A","page":6,"uid":"de3_cau33","quiz":3,"category":"Nhà nước","source":"Đề 3 · Câu 33 · Trang 6","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Hoạt động truy tố người phạm tội ra trước tòa án."},{"id":34,"q":"Cơ quan hành pháp là:","options":{"A":"Chủ tịch nước, Chính phủ, Hội đồng nhân dân","B":"Quốc hội, Chính phủ","C":"Ủy ban thường vụ quốc hội, Chủ tịch nước","D":"Tất cả đều sai"},"answer":"D","page":6,"uid":"de3_cau34","quiz":3,"category":"Nhà nước","source":"Đề 3 · Câu 34 · Trang 6","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Tất cả đều sai."}],"count":34},"4":{"id":4,"title":"Đề 4","questions":[{"id":1,"q":"Viện kiểm sát nằm trong hệ thống cơ quan nào của bộ máy nhà nước Việt Nam?","options":{"A":"Hành pháp","B":"Tư pháp","C":"Lập pháp","D":"Tòa án"},"answer":"B","page":1,"uid":"de4_cau1","quiz":4,"category":"Nhà nước","source":"Đề 4 · Câu 1 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Tư pháp."},{"id":2,"q":"Căn cứ vào phạm vi hoạt động của nhà nước, chức năng của nhà nước được phân thành:","options":{"A":"Chức năng đối ngoại","B":"Tất cả các đáp án đều sai","C":"Cả chức năng đối nội và đối ngoại","D":"Chức năng đối nội"},"answer":"C","page":1,"uid":"de4_cau2","quiz":4,"category":"Nhà nước","source":"Đề 4 · Câu 2 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Cả chức năng đối nội và đối ngoại."},{"id":3,"q":"Đâu là đặc trưng của nhà nước pháp quyền?","options":{"A":"Sự thống trị của pháp luật trong mọi lĩnh vực của đời sống xã hội","B":"Sự ràng buộc của cơ quan nhà nước, công chức nhà nước bởi pháp luật","C":"Tất cả các đáp án trên","D":"Xác định rõ trách nhiệm của nhà nước và công dân trên cơ sở pháp luật"},"answer":"C","page":1,"uid":"de4_cau3","quiz":4,"category":"Nhà nước","source":"Đề 4 · Câu 3 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Tất cả các đáp án trên."},{"id":4,"q":"Hệ thống chính trị Việt Nam gồm mấy bộ phận (mấy chủ thể)?","options":{"A":"5","B":"4","C":"3","D":"2"},"answer":"C","page":1,"uid":"de4_cau4","quiz":4,"category":"Lý luận chung về pháp luật","source":"Đề 4 · Câu 4 · Trang 1","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án C: 3."},{"id":5,"q":"Trung tâm của bộ máy nhà nước cộng hòa xã hội chủ nghĩa Việt Nam là cơ quan nào?","options":{"A":"Quốc hội","B":"Chính phủ","C":"Hội đồng nhân dân các cấp","D":"Ủy ban nhân dân các cấp"},"answer":"A","page":1,"uid":"de4_cau5","quiz":4,"category":"Nhà nước","source":"Đề 4 · Câu 5 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Quốc hội."},{"id":6,"q":"Nguyên thủ quốc gia của Việt Nam là ai?","options":{"A":"Tổng bí thư","B":"Chủ tịch nước","C":"Thủ tướng chính phủ","D":"Chủ tịch quốc hội"},"answer":"B","page":1,"uid":"de4_cau6","quiz":4,"category":"Nhà nước","source":"Đề 4 · Câu 6 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Chủ tịch nước."},{"id":7,"q":"Có mấy hình thức thực hiện pháp luật?","options":{"A":"3","B":"4","C":"2","D":"5"},"answer":"B","page":1,"uid":"de4_cau7","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 7 · Trang 1","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án B: 4."},{"id":8,"q":"Chủ thể thực hiện áp dụng pháp luật là ai?","options":{"A":"Các cơ quan công chức nhà nước","B":"Cá nhân, tổ chức","C":"Các cơ quan, công chức nhà nước có thẩm quyền","D":"Ai cũng có quyền áp dụng pháp luật"},"answer":"C","page":1,"uid":"de4_cau8","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 8 · Trang 1","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án C: Các cơ quan, công chức nhà nước có thẩm quyền."},{"id":9,"q":"Tuân thủ pháp luật là gì?","options":{"A":"Thực hiện những quy định về quyền chủ thể của pháp luật","B":"Thực hiện những quy định trao nghĩa vụ bắt buộc","C":"Thực hiện những QPPL mang tính chất ngăn cấm bằng hành vi thụ động (kiềm chế không làm)","D":"Cả A và B đều đúng"},"answer":"C","page":2,"uid":"de4_cau9","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 9 · Trang 2","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án C: Thực hiện những QPPL mang tính chất ngăn cấm bằng hành vi thụ động (kiềm chế không làm)."},{"id":10,"q":"Chấp hành (thi hành) pháp luật là gì?","options":{"A":"Không làm những việc mà pháp luật cấm","B":"Thực hiện các quyền mà pháp luật quy định","C":"Phải thực hiện đúng các nghĩa vụ mà pháp luật bắt buộc","D":"Cả ba hoạt động trên"},"answer":"C","page":2,"uid":"de4_cau10","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 10 · Trang 2","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án C: Phải thực hiện đúng các nghĩa vụ mà pháp luật bắt buộc."},{"id":11,"q":"Vận dụng (sử dụng) pháp luật là gì?","options":{"A":"Thực hiện các QPPL bắt buộc","B":"Thực hiện các QPPL cấm đoán","C":"Cả ba đáp án đều đúng","D":"Thực hiện các QPPL cho phép"},"answer":"D","page":2,"uid":"de4_cau11","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 11 · Trang 2","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án D: Thực hiện các QPPL cho phép."},{"id":12,"q":"Đội mũ bảo hiểm đi ra đường là thực hiện pháp luật dưới hình thức gì?","options":{"A":"Áp dụng pháp luật","B":"Tuân thủ pháp luật","C":"Thi hành pháp luật","D":"Sử dụng pháp luật"},"answer":"C","page":2,"uid":"de4_cau12","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 12 · Trang 2","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án C: Thi hành pháp luật."},{"id":13,"q":"Vi phạm pháp luật là khi chủ thể có năng lực trách nhiệm pháp lý:","options":{"A":"Thực hiện hành vi cụ thể trái với quy định của pháp luật, có lỗi của chủ thể","B":"Không thực hiện những hành động nhất định theo yêu cầu của pháp luật","C":"Thực hiện hành động cụ thể hợp pháp","D":"Không có đáp án nào đúng"},"answer":"A","page":2,"uid":"de4_cau13","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 13 · Trang 2","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án A: Thực hiện hành vi cụ thể trái với quy định của pháp luật, có lỗi của chủ thể."},{"id":14,"q":"Hành vi trái pháp luật được thể hiện dưới mấy dạng?","options":{"A":"Dưới dạng hành động","B":"Dưới dạng không hành động","C":"Dưới cả 2 dạng: hành động và không hành động","D":"Dưới dạng ý nghĩ"},"answer":"C","page":2,"uid":"de4_cau14","quiz":4,"category":"Lý luận chung về pháp luật","source":"Đề 4 · Câu 14 · Trang 2","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án C: Dưới cả 2 dạng: hành động và không hành động."},{"id":15,"q":"Thực hiện pháp luật là gì?","options":{"A":"Là hoạt động có mục đích của các chủ thể","B":"Nhằm đưa các quy định của pháp luật vào thực tế cuộc sống","C":"Là hành vi hợp pháp của các chủ thể pháp luật","D":"Tất cả các đáp án trên đều đúng"},"answer":"D","page":2,"uid":"de4_cau15","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 15 · Trang 2","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án D: Tất cả các đáp án trên đều đúng."},{"id":16,"q":"Thực hiện 5K trong phòng chống dịch là chúng ta đang thực hiện pháp luật dưới hình thức nào?","options":{"A":"Thi hành pháp luật","B":"Tuân thủ pháp luật","C":"Sử dụng pháp luật","D":"Áp dụng pháp luật"},"answer":"A","page":3,"uid":"de4_cau16","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 16 · Trang 3","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án A: Thi hành pháp luật."},{"id":17,"q":"Hành vi trái pháp luật của chủ thể có lỗi khi:","options":{"A":"Chủ thể có khả năng nhận thức được hậu quả và có lựa chọn nhưng vẫn thực hiện hành vi trái pháp luật","B":"Phản ánh trạng thái tâm lý bên ngoài của chủ thể","C":"Chủ thể không có khả năng nhận thức được hậu quả","D":"Tất cả các đáp án trên"},"answer":"A","page":3,"uid":"de4_cau17","quiz":4,"category":"Lý luận chung về pháp luật","source":"Đề 4 · Câu 17 · Trang 3","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án A: Chủ thể có khả năng nhận thức được hậu quả và có lựa chọn nhưng vẫn thực hiện hành vi trái pháp luật."},{"id":18,"q":"Hành vi vi phạm pháp luật là những hành vi cụ thể của chủ thể được thể hiện dưới mấy dạng?","options":{"A":"3","B":"4","C":"1","D":"2"},"answer":"D","page":3,"uid":"de4_cau18","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 18 · Trang 3","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án D: 2."},{"id":19,"q":"Trong 4 trường hợp dưới đây, đâu là trường hợp cần có sự can thiệp của nhà nước để pháp luật được thực hiện đúng?","options":{"A":"Thực hiện 5K trong phòng chống dịch","B":"Khi áp dụng chế tài đối với những cá nhân, tổ chức vi phạm pháp luật","C":"Đội mũ bảo hiểm khi đi ra đường","D":"Tất cả các trường hợp trên"},"answer":"B","page":3,"uid":"de4_cau19","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 19 · Trang 3","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án B: Khi áp dụng chế tài đối với những cá nhân, tổ chức vi phạm pháp luật."},{"id":20,"q":"Quyết định áp dụng pháp luật có giá trị:","options":{"A":"Có hiệu lực một lần đối với một vụ việc cụ thể","B":"Có hiệu lực đối với cá nhân, tổ chức cụ thể","C":"Tất cả các đáp án trên đều đúng","D":"Được đảm bảo thực hiện bằng sức mạnh cưỡng chế của Nhà nước"},"answer":"C","page":3,"uid":"de4_cau20","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 20 · Trang 3","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án C: Tất cả các đáp án trên đều đúng."},{"id":21,"q":"Năng lực trách nhiệm pháp lý của chủ thể vi phạm pháp luật được xác định như thế nào?","options":{"A":"Chủ thể có năng lực TNPL khi đạt độ tuổi nhất định và có khả năng nhận thức bình thường","B":"Đối với tổ chức luôn có năng lực TNPL, cá nhân phụ thuộc vào độ tuổi và khả năng nhận thức","C":"Các chủ thể cá nhân, tổ chức đều có năng lực TNPL khi thực hiện hành vi trái pháp luật","D":"Chỉ có cá nhân mới có năng lực trách nhiệm pháp lý"},"answer":"B","page":3,"uid":"de4_cau21","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 21 · Trang 3","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án B: Đối với tổ chức luôn có năng lực TNPL, cá nhân phụ thuộc vào độ tuổi và khả năng nhận thức."},{"id":22,"q":"Mặt khách quan của vi phạm pháp luật gồm những dấu hiệu nào?","options":{"A":"Hành vi trái pháp luật và hậu quả nguy hiểm cho xã hội","B":"Mối quan hệ nhân quả giữa hành vi và hậu quả","C":"Tất cả các đáp án trên đều đúng","D":"Thời gian, địa điểm, công cụ, phương tiện vi phạm"},"answer":"C","page":3,"uid":"de4_cau22","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 22 · Trang 3","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án C: Tất cả các đáp án trên đều đúng."},{"id":23,"q":"Các dấu hiệu của vi phạm pháp luật là:","options":{"A":"Hành vi cụ thể của chủ thể","B":"Hành vi trái pháp luật","C":"Có lỗi và do chủ thể có năng lực TNPL thực hiện","D":"Tất cả các dấu hiệu trên"},"answer":"D","page":4,"uid":"de4_cau23","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 23 · Trang 4","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án D: Tất cả các dấu hiệu trên."},{"id":24,"q":"Hành vi trái pháp luật thực hiện trong trường hợp nào sau đây thì không bị coi là có lỗi?","options":{"A":"Sự kiện bất ngờ","B":"Tình thế cấp thiết","C":"Tất cả các trường hợp nêu trên","D":"Phòng vệ chính đáng"},"answer":"C","page":4,"uid":"de4_cau24","quiz":4,"category":"Lý luận chung về pháp luật","source":"Đề 4 · Câu 24 · Trang 4","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án C: Tất cả các trường hợp nêu trên."},{"id":25,"q":"Hậu quả do hành vi trái pháp luật gây ra cho xã hội là:","options":{"A":"Những thiệt hại về vật chất và thể chất","B":"Những thiệt hại hoặc nguy cơ gây ra thiệt hại cho các quan hệ xã hội được pháp luật bảo vệ","C":"Những thiệt hại về tinh thần","D":"Tất cả các đáp án trên"},"answer":"B","page":4,"uid":"de4_cau25","quiz":4,"category":"Lý luận chung về pháp luật","source":"Đề 4 · Câu 25 · Trang 4","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án B: Những thiệt hại hoặc nguy cơ gây ra thiệt hại cho các quan hệ xã hội được pháp luật bảo vệ."},{"id":26,"q":"Mặt chủ quan của vi phạm pháp luật bao gồm:","options":{"A":"Lỗi","B":"Động cơ","C":"Mục đích","D":"Tất cả các yếu tố trên"},"answer":"D","page":4,"uid":"de4_cau26","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 26 · Trang 4","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án D: Tất cả các yếu tố trên."},{"id":27,"q":"Không mong muốn hậu quả khi thực hiện hành vi trái pháp luật là đặc điểm của loại lỗi nào?","options":{"A":"Lỗi cố ý trực tiếp","B":"Lỗi cố ý gián tiếp","C":"Không có đáp án nào đúng","D":"Lỗi vô ý"},"answer":"D","page":4,"uid":"de4_cau27","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 27 · Trang 4","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án D: Lỗi vô ý."},{"id":28,"q":"Không nhận thức được hậu quả khi thực hiện hành vi trái pháp luật mặc dù có trách nhiệm nhận thức và có thể nhận thức được, thì đó là dấu hiệu của:","options":{"A":"Lỗi vô ý do quá tự tin","B":"Lỗi cố ý gián tiếp","C":"Lỗi cố ý trực tiếp","D":"Lỗi vô ý do cẩu thả"},"answer":"D","page":4,"uid":"de4_cau28","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 28 · Trang 4","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án D: Lỗi vô ý do cẩu thả."},{"id":29,"q":"Trách nhiệm pháp lý được áp dụng đối với:","options":{"A":"Cá nhân, tổ chức không thực hiện nghĩa vụ pháp lý","B":"Chủ thể có ý nghĩ trái pháp luật","C":"Cá nhân, tổ chức vi phạm đạo đức","D":"Chủ thể thực hiện hành vi vi phạm pháp luật"},"answer":"D","page":4,"uid":"de4_cau29","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 29 · Trang 4","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án D: Chủ thể thực hiện hành vi vi phạm pháp luật."},{"id":30,"q":"Loại trách nhiệm pháp lý nào nghiêm khắc nhất?","options":{"A":"Trách nhiệm dân sự","B":"Trách nhiệm hình sự","C":"Trách nhiệm hành chính","D":"Trách nhiệm kỷ luật"},"answer":"B","page":4,"uid":"de4_cau30","quiz":4,"category":"Luật hình sự","source":"Đề 4 · Câu 30 · Trang 4","hint":"Nhớ dấu hiệu tội phạm, hình phạt và trách nhiệm hình sự.","explanation":"Đáp án B: Trách nhiệm hình sự."},{"id":31,"q":"Trách nhiệm hành chính được thể hiện dưới dạng nào?","options":{"A":"Hình phạt","B":"Phạt tiền","C":"Xử phạt hành chính","D":"Bồi thường thiệt hại"},"answer":"C","page":4,"uid":"de4_cau31","quiz":4,"category":"Luật hình sự","source":"Đề 4 · Câu 31 · Trang 4","hint":"Nhớ dấu hiệu tội phạm, hình phạt và trách nhiệm hình sự.","explanation":"Đáp án C: Xử phạt hành chính."},{"id":32,"q":"Trách nhiệm dân sự được thể hiện dưới những hình thức nào sau đây?","options":{"A":"Tất cả các hình thức nêu trên","B":"Bồi thường thiệt hại do vi phạm gây ra","C":"Phạt vi phạm","D":"Đính chính xin lỗi công khai"},"answer":"A","page":5,"uid":"de4_cau32","quiz":4,"category":"Lý luận chung về pháp luật","source":"Đề 4 · Câu 32 · Trang 5","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án A: Tất cả các hình thức nêu trên."},{"id":33,"q":"Hình phạt là hình thức của loại trách nhiệm pháp lý nào?","options":{"A":"Trách nhiệm hành chính","B":"Trách nhiệm kỷ luật","C":"Trách nhiệm hình s ề 4 · Câu 37 · Trang 5","hint":"Nhớ dấu hiệu tội phạm, hình phạt và trách nhiệm hình sự.","explanation":"Đáp án D: Trách nhiệm hành chính."},{"id":38,"q":"Mình cho bạn vay tiền, đến hạn bạn không trả, mình kiện bạn ra tòa và tòa thụ lý giải quyết thì những hình thức thực hiện pháp luật nào được áp dụng?","options":{"A":"Sử dụng pháp luật","B":"Chấp hành pháp luật","C":"Áp dụng pháp luật","D":"Cả A và C đều đúng"},"answer":"D","page":5,"uid":"de4_cau38","quiz":4,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 4 · Câu 38 · Trang 5","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án D: Cả A và C đều đúng."},{"id":39,"q":"Sinh viên vi phạm quy chế thi bị khiển trách, đó là loại trách nhiệm gì?","options":{"A":"Trách nhiệm hành chính","B":"Trách nhiệm dân sự","C":"Trách nhiệm kỷ luật","D":"Trách nhiệm hình sự"},"answer":"C","page":5,"uid":"de4_cau39","quiz":4,"category":"Luật hình sự","source":"Đề 4 · Câu 39 · Trang 5","hint":"Nhớ dấu hiệu tội phạm, hình phạt và trách nhiệm hình sự.","explanation":"Đáp án C: Trách nhiệm kỷ luật."}],"count":39},"5":{"id":5,"title":"Đề 5","questions":[{"id":1,"q":"Năng lực pháp luật của cá nhân phụ thuộc vào:","options":{"A":"Hoàn cảnh kinh tế của cá nhân đó","B":"Độ tuổi và khả năng nhận thức của cá nhân đó","C":"Pháp luật của từng quốc gia","D":"Độ tuổi, khả năng nhận thức và hoàn cảnh kinh tế"},"answer":"C","page":1,"uid":"de5_cau1","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 1 · Trang 1","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Pháp luật của từng quốc gia."},{"id":2,"q":"Anh A mới ký hợp đồng với công ty X để mua một chiếc xe ô tô với trị giá 1 tỷ. Xác định khách thể của quan hệ pháp luật nói trên:","options":{"A":"Quyền sở hữu chiếc xe ô tô","B":"Quyền sử dụng chiếc xe ô tô","C":"Chiếc xe ô tô","D":"Số tiền 1 tỷ"},"answer":"A","page":1,"uid":"de5_cau2","quiz":5,"category":"Luật dân sự","source":"Đề 5 · Câu 2 · Trang 1","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án A: Quyền sở hữu chiếc xe ô tô."},{"id":3,"q":"Nhận định nào sau đây là sai:","options":{"A":"Năng lực pháp luật của cá nhân là khác nhau","B":"Năng lực pháp luật của cá nhân xuất hiện khi cá nhân đó sinh ra","C":"Năng lực pháp luật của cá nhân mất đi khi cá nhân đó chết","D":"Năng lực pháp luật có từ khi sinh ra và mất đi khi chết"},"answer":"A","page":1,"uid":"de5_cau3","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 3 · Trang 1","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Năng lực pháp luật của cá nhân là khác nhau."},{"id":4,"q":"Nhận định nào sau đây là sai:","options":{"A":"Tất cả các nhận định trên đều sai","B":"Năng lực pháp luật, năng lực hành vi của tổ chức xuất hiện đồng thời cùng một lúc kể từ thời điểm tổ chức đó được thành lập","C":"Năng lực pháp luật của tổ chức mất đi khi tổ chức đó bị giải thể","D":"Năng lực pháp luật của tổ chức xuất hiện khi tổ chức đó được thành lập"},"answer":"A","page":1,"uid":"de5_cau4","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 4 · Trang 1","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Tất cả các nhận định trên đều sai."},{"id":5,"q":"Nội dung của quan hệ pháp luật:","options":{"A":"Gồm các quyền chủ thể của các bên tham gia quan hệ pháp luật","B":"Đồng nghĩa với năng lực pháp luật vì đều quy định quyền và nghĩa vụ của chủ thể","C":"Gồm các quyền chủ thể và nghĩa vụ pháp lý của các bên tham gia quan hệ pháp luật","D":"Gồm các nghĩa vụ pháp lý của các bên tham gia quan hệ pháp luật"},"answer":"C","page":1,"uid":"de5_cau5","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 5 · Trang 1","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Gồm các quyền chủ thể và nghĩa vụ pháp lý của các bên tham gia quan hệ pháp luật."},{"id":6,"q":"Quyền của chủ thể là cách xử sự mà pháp luật:","options":{"A":"Cho phép chủ thể thực hiện","B":"Cho phép hoặc khuyến khích chủ thể thực hiện","C":"Khuyến khích chủ thể thực hiện","D":"Cấm chủ thể thực hiện"},"answer":"B","page":2,"uid":"de5_cau6","quiz":5,"category":"Lý luận chung về pháp luật","source":"Đề 5 · Câu 6 · Trang 2","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án B: Cho phép hoặc khuyến khích chủ thể thực hiện."},{"id":7,"q":"Quyền của chủ thể được biểu hiện ở các khía cạnh nào sau đây:","options":{"A":"Quyền thụ hưởng","B":"Quyền sử dụng, quyền sở hữu","C":"Quyền chuyển nhượng","D":"Cả 3 đáp án trên"},"answer":"D","page":2,"uid":"de5_cau7","quiz":5,"category":"Luật dân sự","source":"Đề 5 · Câu 7 · Trang 2","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án D: Cả 3 đáp án trên."},{"id":8,"q":"Nhận định nào sau đây là đúng:","options":{"A":"Chủ thể bắt buộc phải thực hiện quyền của mình","B":"Nhà nước yêu cầu chủ thể phải thực hiện quyền của mình","C":"Các bên tham gia yêu cầu chủ thể thực hiện quyền của mình","D":"Chủ thể có thể không thực hiện quyền của mình"},"answer":"D","page":2,"uid":"de5_cau8","quiz":5,"category":"Nhà nước","source":"Đề 5 · Câu 8 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Chủ thể có thể không thực hiện quyền của mình."},{"id":9,"q":"Nghĩa vụ pháp lý là cách xử sự mà pháp luật:","options":{"A":"Bắt buộc chủ thể phải thực hiện để đáp ứng quyền của chủ thể bên kia","B":"Cấm chủ thể thực hiện","C":"Khuyến khích chủ thể thực hiện","D":"Cho phép chủ thể thực hiện"},"answer":"A","page":2,"uid":"de5_cau9","quiz":5,"category":"Lý luận chung về pháp luật","source":"Đề 5 · Câu 9 · Trang 2","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án A: Bắt buộc chủ thể phải thực hiện để đáp ứng quyền của chủ thể bên kia."},{"id":10,"q":"Đặc điểm của nghĩa vụ pháp lý:","options":{"A":"Cả 3 đáp án trên","B":"Được áp đặt bởi pháp luật","C":"Có tính chất pháp lý","D":"Bắt buộc phải thực hiện"},"answer":"A","page":2,"uid":"de5_cau10","quiz":5,"category":"Lý luận chung về pháp luật","source":"Đề 5 · Câu 10 · Trang 2","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án A: Cả 3 đáp án trên."},{"id":11,"q":"Khách thể của quan hệ pháp luật là:","options":{"A":"Lợi ích mà các bên mong muốn đạt được và là yếu tố thúc đẩy các bên tham gia quan hệ pháp luật","B":"Yếu tố thúc đẩy các bên tham gia quan hệ pháp luật","C":"Lợi ích mà các bên mong muốn đạt được khi tham gia quan hệ pháp luật","D":"Đối tượng mà các bên tác động vào khi tham gia quan hệ pháp luật"},"answer":"A","page":2,"uid":"de5_cau11","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 11 · Trang 2","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Lợi ích mà các bên mong muốn đạt được và là yếu tố thúc đẩy các bên tham gia quan hệ pháp luật."},{"id":12,"q":"Sự kiện pháp lý:","options":{"A":"Là những hoàn cảnh tình huống trong thực tế","B":"Là những hoàn cảnh, tình huống trong thực tế làm phát sinh, thay đổi, chấm dứt các quan hệ pháp luật","C":"Làm phát sinh, thay đổi và chấm dứt các quan hệ pháp luật","D":"Là yếu tố thúc đẩy các bên tham gia quan hệ pháp luật"},"answer":"B","page":2,"uid":"de5_cau12","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 12 · Trang 2","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án B: Là những hoàn cảnh, tình huống trong thực tế làm phát sinh, thay đổi, chấm dứt các quan hệ pháp luật."},{"id":13,"q":"Sự kiện pháp lý gồm mấy loại:","options":{"A":"Các hành vi pháp lý và sự biến pháp lý","B":"Các hành vi thực tế","C":"Các sự biến pháp lý","D":"Các hành vi và sự kiện thực tế"},"answer":"A","page":3,"uid":"de5_cau13","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 13 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Các hành vi pháp lý và sự biến pháp lý."},{"id":14,"q":"Tác động của sự kiện pháp lý đối với quan hệ pháp luật là:","options":{"A":"Tất cả các phương án","B":"Làm phát sinh","C":"Làm chấm dứt","D":"Làm thay đổi"},"answer":"A","page":3,"uid":"de5_cau14","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 14 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Tất cả các phương án."},{"id":15,"q":"Nhận định nào sau đây là đúng:","options":{"A":"Sự biến là sự kiện pháp lý phổ biến trong thực tiễn cuộc sống","B":"Sự biến là sự kiện pháp lý phụ thuộc vào ý chí của con người","C":"Sự biến là sự kiện pháp lý được thực hiện dưới dạng hành động","D":"Sự biến là sự kiện pháp lý không phụ thuộc vào ý chí của con người"},"answer":"D","page":3,"uid":"de5_cau15","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 15 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Sự biến là sự kiện pháp lý không phụ thuộc vào ý chí của con người."},{"id":16,"q":"Hành vi pháp lý là loại sự kiện pháp lý:","options":{"A":"Phụ thuộc vào ý chí của con người và phổ biến trong thực tiễn cuộc sống","B":"Phụ thuộc vào ý chí của con người","C":"Phổ biến trong thực tiễn cuộc sống","D":"Không phụ thuộc vào ý chí của con người"},"answer":"A","page":3,"uid":"de5_cau16","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 16 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Phụ thuộc vào ý chí của con người và phổ biến trong thực tiễn cuộc sống."},{"id":17,"q":"Hệ thống pháp luật Islamic Law còn được gọi là:","options":{"A":"Hệ thống pháp luật dân luật","B":"Hệ thống pháp luật thông luật","C":"Hệ thống pháp luật hồi giáo","D":"Cả 3 đáp án đều sai"},"answer":"C","page":3,"uid":"de5_cau17","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 17 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Hệ thống pháp luật hồi giáo."},{"id":18,"q":"Điều kiện để xác định một quốc gia thuộc hệ thống pháp luật Islamic Law là:","options":{"A":"Đạo hồi là quốc đạo của quốc gia đó","B":"Quốc gia lấy quy định trong kinh thánh của Đạo hồi làm luật","C":"Đạo hồi là quốc đạo và lấy quy định trong kinh thánh làm luật","D":"Đạo hồi được coi là tôn giáo của quốc gia đó"},"answer":"C","page":3,"uid":"de5_cau18","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 18 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Đạo hồi là quốc đạo và lấy quy định trong kinh thánh làm luật."},{"id":19,"q":"Quyền sở hữu trí tuệ gồm:","options":{"A":"Quyền đối với giống cây trồng","B":"Tất cả các đáp án trên","C":"Quyền tác giả và quyền liên quan đến quyền tác giả","D":"Quyền sở hữu công nghiệp"},"answer":"B","page":3,"uid":"de5_cau19","quiz":5,"category":"Sở hữu trí tuệ","source":"Đề 5 · Câu 19 · Trang 3","hint":"Phân biệt rõ sáng chế, kiểu dáng, nhãn hiệu và quyền tác giả.","explanation":"Đáp án B: Tất cả các đáp án trên."},{"id":20,"q":"Quyền tác giả là quyền của cá nhân,... đối với tác phẩm do mình sáng tạo ra hoặc...","options":{"A":"Tổ chức, sở hữu","B":"Pháp nhân, sử dụng","C":"Pháp nhân, sở hữu","D":"Tổ chức, sử dụng"},"answer":"A","page":3,"uid":"de5_cau20","quiz":5,"category":"Sở hữu trí tuệ","source":"Đề 5 · Câu 20 · Trang 3","hint":"Phân biệt rõ sáng chế, kiểu dáng, nhãn hiệu và quyền tác giả.","explanation":"Đáp án A: Tổ chức, sở hữu."},{"id":21,"q":"Quyền sở hữu công nghiệp gồm những gì:","options":{"A":"Nhãn hiệu, tên thương mại, bí mật kinh doanh","B":"Tất cả các đáp án trên","C":"Quyền sở hữu của cá nhân, pháp nhân đối với sáng chế","D":"Kiểu dáng công nghiệp"},"answer":"B","page":4,"uid":"de5_cau21","quiz":5,"category":"Sở hữu trí tuệ","source":"Đề 5 · Câu 21 · Trang 4","hint":"Phân biệt rõ sáng chế, kiểu dáng, nhãn hiệu và quyền tác giả.","explanation":"Đáp án B: Tất cả các đáp án trên."},{"id":22,"q":"Quyền sở hữu công nghiệp đối với sáng chế được xác lập trên cơ sở gì?","options":{"A":"Quyết định cấp văn bằng bảo hộ của cơ quan nhà nước có thẩm quyền","B":"Có khả năng áp dụng công nghiệp","C":"Có tính mới, có tính sáng tạo","D":"Thuộc đối tượng được bảo hộ"},"answer":"A","page":4,"uid":"de5_cau22","quiz":5,"category":"Sở hữu trí tuệ","source":"Đề 5 · Câu 22 · Trang 4","hint":"Phân biệt rõ sáng chế, kiểu dáng, nhãn hiệu và quyền tác giả.","explanation":"Đáp án A: Quyết định cấp văn bằng bảo hộ của cơ quan nhà nước có thẩm quyền."},{"id":23,"q":"Sáng chế được bảo hộ dưới hình thức cấp bằng độc quyền sáng chế nếu đáp ứng được những điều kiện nào?","options":{"A":"Có tính mới, có tính sáng tạo","B":"Có tính mới, có tính sáng tạo, có khả năng áp dụng công nghiệp, thuộc đối tượng được bảo hộ","C":"Có khả năng áp dụng công nghiệp, thuộc đối tượng được bảo hộ","D":"Thuộc đối tượng được bảo hộ"},"answer":"B","page":4,"uid":"de5_cau23","quiz":5,"category":"Sở hữu trí tuệ","source":"Đề 5 · Câu 23 · Trang 4","hint":"Phân biệt rõ sáng chế, kiểu dáng, nhãn hiệu và quyền tác giả.","explanation":"Đáp án B: Có tính mới, có tính sáng tạo, có khả năng áp dụng công nghiệp, thuộc đối tượng được bảo hộ."},{"id":24,"q":"Nhãn hiệu được bảo hộ nếu đáp ứng được những điều kiện gì?","options":{"A":"Có tính mới, có tính sáng tạo, có khả năng áp dụng công nghiệp","B":"Là dấu hiệu nhìn thấy được và có khả năng phân biệt hàng hoá, dịch vụ của chủ thể này với chủ thể khác","C":"Có khả năng phân biệt hàng hoá, dịch vụ của chủ sở hữu nhãn hiệu","D":"Là dấu hiệu nhìn thấy được dưới dạng chữ cái, từ ngữ, hình vẽ..."},"answer":"B","page":4,"uid":"de5_cau24","quiz":5,"category":"Sở hữu trí tuệ","source":"Đề 5 · Câu 24 · Trang 4","hint":"Phân biệt rõ sáng chế, kiểu dáng, nhãn hiệu và quyền tác giả.","explanation":"Đáp án B: Là dấu hiệu nhìn thấy được và có khả năng phân biệt hàng hoá, dịch vụ của chủ thể này với chủ thể khác."},{"id":25,"q":"Tên thương mại là gì?","options":{"A":"Là giải pháp kỹ thuật dưới dạng sản phẩm hoặc quy trình nhằm giải quyết một vấn đề xác định","B":"Là hình dáng bên ngoài của sản phẩm được thể hiện bằng hình khối, đường nét, màu sắc","C":"Là dấu hiệu để phân biệt hàng hóa dịch vụ của các cá nhân, tổ chức khác nhau","D":"Là tên gọi của tổ chức, cá nhân dùng trong hoạt động kinh doanh để phân biệt chủ thể kinh doanh mang tên gọi đó với chủ thể kinh doanh khác"},"answer":"D","page":4,"uid":"de5_cau25","quiz":5,"category":"Sở hữu trí tuệ","source":"Đề 5 · Câu 25 · Trang 4","hint":"Phân biệt rõ sáng chế, kiểu dáng, nhãn hiệu và quyền tác giả.","explanation":"Đáp án D: Là tên gọi của tổ chức, cá nhân dùng trong hoạt động kinh doanh để phân biệt chủ thể kinh doanh mang tên gọi đó với chủ thể kinh doanh khác."},{"id":26,"q":"Mong muốn hậu quả xảy ra khi thực hiện hành vi trái pháp luật đấy là dấu hiệu của loại lỗi nào?","options":{"A":"Lỗi vô ý do quá tự tin","B":"Lỗi cố ý gián tiếp","C":"Lỗi cố ý trực tiếp","D":"Lỗi vô ý do cẩu thả"},"answer":"C","page":4,"uid":"de5_cau26","quiz":5,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 5 · Câu 26 · Trang 4","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án C: Lỗi cố ý trực tiếp."},{"id":27,"q":"Đối tượng điều chỉnh của ngành luật lao động là:","options":{"A":"Quan hệ phát sinh giữa nhà nước với người phạm tội","B":"Quan hệ lao động","C":"Cả quan hệ lao động và quan hệ phát sinh trong quá trình sử dụng lao động","D":"Quan hệ phát sinh trong quá trình sử dụng lao động"},"answer":"C","page":5,"uid":"de5_cau27","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 27 · Trang 5","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Cả quan hệ lao động và quan hệ phát sinh trong quá trình sử dụng lao động."},{"id":28,"q":"Nguồn của luật lao động là:","options":{"A":"Bộ luật hình sự","B":"Luật doanh nghiệp","C":"Bộ luật lao động","D":"Bộ luật dân sự"},"answer":"C","page":5,"uid":"de5_cau28","quiz":5,"category":"Luật dân sự","source":"Đề 5 · Câu 28 · Trang 5","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án C: Bộ luật lao động."},{"id":29,"q":"Phương pháp điều chỉnh của ngành luật lao động:","options":{"A":"Phương pháp mệnh lệnh, phục tùng","B":"Không có đáp án đúng","C":"Cả phương pháp tự nguyện thỏa thuận và phương pháp mệnh lệnh, phục tùng","D":"Phương pháp tự nguyện thỏa thuận"},"answer":"C","page":5,"uid":"de5_cau29","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 29 · Trang 5","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Cả phương pháp tự nguyện thỏa thuận và phương pháp mệnh lệnh, phục tùng."},{"id":30,"q":"Quan hệ pháp luật được hình thành từ những chủ thể nào?","options":{"A":"Người lao động và người sử dụng lao động","B":"Người lao động","C":"Người sử dụng lao động","D":"Nhà nước"},"answer":"A","page":5,"uid":"de5_cau30","quiz":5,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 5 · Câu 30 · Trang 5","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Người lao động và người sử dụng lao động."}],"count":30},"6":{"id":6,"title":"Đề 6","questions":[{"id":1,"q":"Pháp luật có tính quy phạm phổ biến có nghĩa là:","options":{"A":"Các quy phạm pháp luật được áp dụng một lần duy nhất","B":"Quy phạm pháp luật được áp dụng nhiều lần","C":"Quy phạm pháp luật được khái quát hóa từ nhiều trường hợp mang tính phổ biến trong xã hội","D":"Cả B và C"},"answer":"D","page":1,"uid":"de6_cau1","quiz":6,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 6 · Câu 1 · Trang 1","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Cả B và C."},{"id":2,"q":"Khi nghiên cứu về bản chất của pháp luật thì khẳng định nào sau đây là sai:","options":{"A":"Pháp luật vừa mang tính chủ quan lại vừa mang tính khách quan","B":"Pháp luật là ý chí của giai cấp thống trị được đề lên thành luật","C":"Pháp luật bao giờ cũng thể hiện bản chất giai cấp rõ nét hơn bản chất xã hội","D":"Pháp luật là hiện tượng vừa mang tính giai cấp vừa mang tính xã hội"},"answer":"C","page":1,"uid":"de6_cau2","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 2 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Pháp luật bao giờ cũng thể hiện bản chất giai cấp rõ nét hơn bản chất xã hội."},{"id":3,"q":"Chọn phương án đúng nhất để điền vào chỗ trống: Xuất phát từ... cho nên bất cứ nhà nước nào cũng dùng pháp luật làm phương tiện chủ yếu để quản lý mọi mặt đời sống xã hội.","options":{"A":"Tính cưỡng chế của pháp luật","B":"Những thuộc tính cơ bản của pháp luật","C":"Tính xác định chặt chẽ về mặt hình thức","D":"Tính quy phạm phổ biến của pháp luật"},"answer":"B","page":1,"uid":"de6_cau3","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 3 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Những thuộc tính cơ bản của pháp luật."},{"id":4,"q":"Đáp án nào sau đây thể hiện thuộc tính của pháp luật:","options":{"A":"Tính chính xác","B":"Tính quy phạm phổ biến và bắt buộc chung","C":"Tính minh bạch","D":"Tất cả đều đúng"},"answer":"B","page":1,"uid":"de6_cau4","quiz":6,"category":"Lý luận chung về pháp luật","source":"Đề 6 · Câu 4 · Trang 1","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án B: Tính quy phạm phổ biến và bắt buộc chung."},{"id":5,"q":"Nội dung của pháp luật phải quy định rõ ràng chặt chẽ trong các văn bản pháp luật là biểu hiện của thuộc tính nào của pháp luật:","options":{"A":"Tính quy phạm phổ biến","B":"Tất cả các đáp án trên","C":"Tính xác định chặt chẽ về mặt hình thức của pháp luật","D":"Tính bắt buộc"},"answer":"C","page":1,"uid":"de6_cau5","quiz":6,"category":"Hình thức và nguồn pháp luật","source":"Đề 6 · Câu 5 · Trang 1","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án C: Tính xác định chặt chẽ về mặt hình thức của pháp luật."},{"id":6,"q":"Pháp luật chủ nô quy định:","options":{"A":"Quyền lực của mọi người trong xã hội là như nhau","B":"Công khai quyền lực vô hạn của chủ nô","C":"Tình trạng vô quyền của giai cấp nô lệ","D":"Cả B và C"},"answer":"D","page":1,"uid":"de6_cau6","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 6 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Cả B và C."},{"id":7,"q":"Nhận định nào sau đây không đúng về pháp luật chủ nô:","options":{"A":"Công khai bảo vệ quyền tư hữu của chủ nô","B":"Củng cố tình trạng bất bình đẳng trong xã hội","C":"Là kiểu pháp luật đầu tiên trong lịch sử","D":"Mang nặng dấu ấn tôn giáo"},"answer":"D","page":2,"uid":"de6_cau7","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 7 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Mang nặng dấu ấn tôn giáo."},{"id":8,"q":"Đặc điểm của pháp luật phong kiến là gì:","options":{"A":"Mang nặng dấu ấn tôn giáo","B":"Cả ba đáp án trên","C":"Quy định những hình phạt rất tàn bạo","D":"Bảo vệ chế độ tư hữu của giai cấp thống trị"},"answer":"B","page":2,"uid":"de6_cau8","quiz":6,"category":"Luật hình sự","source":"Đề 6 · Câu 8 · Trang 2","hint":"Nhớ dấu hiệu tội phạm, hình phạt và trách nhiệm hình sự.","explanation":"Đáp án B: Cả ba đáp án trên."},{"id":9,"q":"Kiểu pháp luật phong kiến thể hiện ý chí của:","options":{"A":"Cả ba câu trên đều đúng","B":"Giai cấp thống trị","C":"Giai cấp địa chủ","D":"Giai cấp phong kiến"},"answer":"A","page":2,"uid":"de6_cau9","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 9 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Cả ba câu trên đều đúng."},{"id":10,"q":"Hình thức phổ biến nhất của pháp luật chủ nô là:","options":{"A":"Tín điều tôn giáo","B":"Văn bản pháp luật","C":"Tập quán pháp","D":"Tiền lệ pháp"},"answer":"C","page":2,"uid":"de6_cau10","quiz":6,"category":"Hình thức và nguồn pháp luật","source":"Đề 6 · Câu 10 · Trang 2","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án C: Tập quán pháp."},{"id":11,"q":"Pháp luật chủ nô cho phép chủ nô có quyền chiếm hữu đối với:","options":{"A":"Cả ba đáp án trên","B":"Tài sản","C":"Tư liệu sản xuất","D":"Nô lệ"},"answer":"A","page":2,"uid":"de6_cau11","quiz":6,"category":"Luật dân sự","source":"Đề 6 · Câu 11 · Trang 2","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án A: Cả ba đáp án trên."},{"id":12,"q":"Kiểu pháp luật nào chịu ảnh hưởng mạnh mẽ của tôn giáo:","options":{"A":"Pháp luật xã hội chủ nghĩa","B":"Pháp luật tư sản","C":"Pháp luật phong kiến","D":"Pháp luật chủ nô"},"answer":"C","page":2,"uid":"de6_cau12","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 12 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Pháp luật phong kiến."},{"id":13,"q":"Nguồn luật chủ yếu của hệ thống Common Law là gì:","options":{"A":"Lẽ phải","B":"Án lệ","C":"Văn bản pháp luật","D":"Tập quán pháp"},"answer":"B","page":2,"uid":"de6_cau13","quiz":6,"category":"Hình thức và nguồn pháp luật","source":"Đề 6 · Câu 13 · Trang 2","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án B: Án lệ."},{"id":14,"q":"Hình thức tranh tụng được dùng chủ yếu trong hệ thống Common Law là hình thức nào:","options":{"A":"Tranh tụng tại tòa","B":"Tranh tụng hành chính","C":"Tranh tụng hình sự","D":"Tranh tụng dân sự"},"answer":"A","page":2,"uid":"de6_cau14","quiz":6,"category":"Lý luận chung về pháp luật","source":"Đề 6 · Câu 14 · Trang 2","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án A: Tranh tụng tại tòa."},{"id":15,"q":"Đối tượng điều chỉnh của pháp luật dân sự là:","options":{"A":"Quan hệ tài sản và quan hệ nhân thân","B":"Chế độ kinh tế, chính trị, xã hội","C":"Tội phạm và hình phạt","D":"Bộ máy nhà nước"},"answer":"A","page":2,"uid":"de6_cau15","quiz":6,"category":"Luật dân sự","source":"Đề 6 · Câu 15 · Trang 2","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án A: Quan hệ tài sản và quan hệ nhân thân."},{"id":16,"q":"Phương pháp điều chỉnh của ngành luật dân sự là gì:","options":{"A":"Bình đẳng, thỏa thuận","B":"Quyền uy thỏa thuận","C":"Quyền uy bình đẳng","D":"Quyền uy phục tùng"},"answer":"A","page":2,"uid":"de6_cau16","quiz":6,"category":"Luật dân sự","source":"Đề 6 · Câu 16 · Trang 2","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án A: Bình đẳng, thỏa thuận."},{"id":17,"q":"Tài sản bao gồm những gì:","options":{"A":"Vật, tiền, giấy tờ có giá, quyền tài sản","B":"Vật, tiền, giấy tờ có giá, quyền sở hữu","C":"Tiền, giấy tờ có giá","D":"Vật, tiền"},"answer":"A","page":3,"uid":"de6_cau17","quiz":6,"category":"Luật dân sự","source":"Đề 6 · Câu 17 · Trang 3","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án A: Vật, tiền, giấy tờ có giá, quyền tài sản."},{"id":18,"q":"Quyền sở hữu bao gồm mấy loại quyền:","options":{"A":"3 (chiếm hữu, sử dụng, định đoạt)","B":"2 (chiếm hữu, định đoạt)","C":"2 (chiếm hữu, sử dụng)","D":"1 (chiếm hữu)"},"answer":"A","page":3,"uid":"de6_cau18","quiz":6,"category":"Luật dân sự","source":"Đề 6 · Câu 18 · Trang 3","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án A: 3 (chiếm hữu, sử dụng, định đoạt)."},{"id":19,"q":"Trong thời gian thế chấp tài sản, chủ sở hữu có quyền như thế nào:","options":{"A":"Có quyền sử dụng nhưng không có quyền định đoạt","B":"Không có quyền chiếm hữu và có quyền sử dụng nhưng vẫn có quyền định đoạt","C":"Có quyền chiếm hữu và quyền sử dụng nhưng bị hạn chế quyền định đoạt","D":"Có quyền chiếm hữu nhưng không có quyền định đoạt"},"answer":"C","page":3,"uid":"de6_cau19","quiz":6,"category":"Luật dân sự","source":"Đề 6 · Câu 19 · Trang 3","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án C: Có quyền chiếm hữu và quyền sử dụng nhưng bị hạn chế quyền định đoạt."},{"id":20,"q":"Di sản thừa kế là:","options":{"A":"Chỉ có tài sản riêng của người chết","B":"Di sản bao gồm tài sản riêng của người chết, phần tài sản của người chết trong tài sản chung với người khác","C":"1/2 tài sản chung của vợ chồng khi người đó chết","D":"Toàn bộ tài sản của người chết"},"answer":"B","page":3,"uid":"de6_cau20","quiz":6,"category":"Luật dân sự","source":"Đề 6 · Câu 20 · Trang 3","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án B: Di sản bao gồm tài sản riêng của người chết, phần tài sản của người chết trong tài sản chung với người khác."},{"id":21,"q":"Chia tài sản thừa kế theo pháp luật là chia:","options":{"A":"Theo di chúc mà người chết để lại","B":"Cả diện thừa kế và hàng thừa kế","C":"Theo hàng thừa kế","D":"Theo diện thừa kế"},"answer":"B","page":3,"uid":"de6_cau21","quiz":6,"category":"Luật dân sự","source":"Đề 6 · Câu 21 · Trang 3","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án B: Cả diện thừa kế và hàng thừa kế."},{"id":22,"q":"Di chúc được coi là hợp pháp khi thỏa mãn những điều kiện luật định về:","options":{"A":"Nội dung di chúc","B":"Người lập di chúc","C":"Hình thức di chúc","D":"Cả ba đáp án trên"},"answer":"D","page":3,"uid":"de6_cau22","quiz":6,"category":"Luật dân sự","source":"Đề 6 · Câu 22 · Trang 3","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án D: Cả ba đáp án trên."},{"id":23,"q":"Nguyên tắc chia thừa kế theo pháp luật:","options":{"A":"Cả B và C đều đúng","B":"Những người thừa kế cùng hàng được chia phần di sản bằng nhau","C":"Hàng thừa kế sau chỉ được nhận di sản thừa kế khi không còn ai ở hàng thừa kế trước","D":"Tất cả các hàng thừa kế đều được chia tài sản nhưng với các phần không bằng nhau"},"answer":"A","page":3,"uid":"de6_cau23","quiz":6,"category":"Luật dân sự","source":"Đề 6 · Câu 23 · Trang 3","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án A: Cả B và C đều đúng."},{"id":24,"q":"Hợp đồng là... giữa các bên về việc xác lập thay đổi hoặc chấm dứt các quyền và nghĩa vụ dân sự:","options":{"A":"Sự thỏa thuận","B":"Cả 3 đáp án đều sai","C":"Sự liên kết","D":"Sự hợp tác"},"answer":"A","page":4,"uid":"de6_cau24","quiz":6,"category":"Lý luận chung về pháp luật","source":"Đề 6 · Câu 24 · Trang 4","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án A: Sự thỏa thuận."},{"id":25,"q":"Pháp luật đại cương nằm trong hệ thống của:","options":{"A":"Ngành luật khoa học pháp lý chuyên ngành liên quan","B":"Ngành luật khoa học pháp lý quốc tế","C":"Ngành luật khoa học pháp lý cơ bản","D":"Ngành luật khoa học pháp lý ứng dụng kỹ thuật"},"answer":"C","page":4,"uid":"de6_cau25","quiz":6,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 6 · Câu 25 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Ngành luật khoa học pháp lý cơ bản."},{"id":26,"q":"Đặc điểm nào sau đây là dấu hiệu đặc trưng của nhà nước?","options":{"A":"Nhà nước ban hành pháp luật và đảm bảo thực hiện pháp luật","B":"Nhà nước chỉ tồn tại trong xã hội có giai cấp","C":"Nhà nước ra đời khi có sự xuất hiện chế độ tư hữu và phân hóa xã hội","D":"Nhà nước luôn mang bản chất giai cấp và bản chất xã hội"},"answer":"A","page":4,"uid":"de6_cau26","quiz":6,"category":"Thực hiện pháp luật và trách nhiệm pháp lý","source":"Đề 6 · Câu 26 · Trang 4","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án A: Nhà nước ban hành pháp luật và đảm bảo thực hiện pháp luật."},{"id":27,"q":"Đặc điểm nào sau đây không phải là dấu hiệu đặc trưng của nhà nước:","options":{"A":"Nhà nước chia dân cư căn cứ vào nghề nghiệp và địa vị xã hội của họ","B":"Nhà nước có chủ quyền quốc gia","C":"Nhà nước thiết lập một quyền lực công cộng đặc biệt nhằm đảm bảo thực hiện bằng bộ máy cưỡng chế đặc thù","D":"Nhà nước ban hành các loại thuế và tổ chức việc thu thuế dưới hình thức bắt buộc"},"answer":"A","page":4,"uid":"de6_cau27","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 27 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Nhà nước chia dân cư căn cứ vào nghề nghiệp và địa vị xã hội của họ."},{"id":28,"q":"Tổ chức nào sau đây đóng vai trò là trung tâm của hệ thống chính trị:","options":{"A":"Cả 3 đáp án trên","B":"Toà án nhân dân tối cao","C":"Đảng Cộng sản Việt Nam","D":"Nhà nước"},"answer":"D","page":4,"uid":"de6_cau28","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 28 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Nhà nước."},{"id":29,"q":"Nhà nước phân chia và quản lý dân cư theo các đơn vị hành chính lãnh thổ là:","options":{"A":"Phân chia lãnh thổ thành những đơn vị hành chính nhỏ hơn","B":"Phân chia cư dân thành nhiều nhóm khác nhau","C":"Chia bộ máy thành nhiều đơn vị cấp nhỏ hơn","D":"Phân chia cư dân và lãnh thổ thành các đơn vị khác nhau"},"answer":"D","page":4,"uid":"de6_cau29","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 29 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Phân chia cư dân và lãnh thổ thành các đơn vị khác nhau."},{"id":30,"q":"Nhà nước phân chia dân cư và lãnh thổ nhằm:","options":{"A":"Quản lý xã hội","B":"Thực hiện quyền lực","C":"Thực hiện chức năng","D":"Trấn áp giai cấp"},"answer":"A","page":4,"uid":"de6_cau30","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 30 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Quản lý xã hội."},{"id":31,"q":"Phân chia cư dân theo các đơn vị hành chính lãnh thổ dựa trên:","options":{"A":"Những đặc thù của từng đơn vị hành chính lãnh thổ","B":"Phương thức thực hiện chức năng của nhà nước","C":"Hình thức của việc thực hiện chức năng của nhà nước","D":"Đặc thù của tổ chức bộ máy nhà nước"},"answer":"A","page":5,"uid":"de6_cau31","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 31 · Trang 5","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Những đặc thù của từng đơn vị hành chính lãnh thổ."},{"id":32,"q":"Chủ quyền quốc gia là:","options":{"A":"Tất cả các phương án nêu trên đều đúng","B":"Quyền ban hành pháp luật của nhà nước","C":"Quyền độc lập tự quyết của quốc gia trong lĩnh vực đối ngoại","D":"Quyền độc lập tự quyết của quốc gia trong lĩnh vực đối nội"},"answer":"A","page":5,"uid":"de6_cau32","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 32 · Trang 5","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Tất cả các phương án nêu trên đều đúng."},{"id":33,"q":"Các nhà nước phải tôn trọng và không can thiệp lẫn nhau là dấu hiệu của đặc trưng nào của nhà nước:","options":{"A":"Nhà nước quản lý dân cư của mình theo đơn vị hành chính lãnh thổ","B":"Vì nhà nước có quyền lực công cộng đặc biệt","C":"Mỗi nhà nước có hệ thống pháp luật riêng","D":"Nhà nước có chủ quyền"},"answer":"D","page":5,"uid":"de6_cau33","quiz":6,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 6 · Câu 33 · Trang 5","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Nhà nước có chủ quyền."},{"id":34,"q":"Nhà nước thiết lập quyền lực công cộng đặc biệt tách rời ra khỏi xã hội và áp đặt lên toàn bộ xã hội thể hiện:","options":{"A":"Quyền lực nhà nước mang tính chất công cộng","B":"Cả ba phương án trên đều đúng","C":"Thiết lập bộ máy nhà nước chuyên biệt","D":"Quyền lực nhà nước đã tách khỏi quyền lực xã hội"},"answer":"B","page":5,"uid":"de6_cau34","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 34 · Trang 5","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Cả ba phương án trên đều đúng."},{"id":35,"q":"Quyền lực công cộng đặc biệt của nhà nước được hiểu là:","options":{"A":"Có thể sử dụng quyền lực kinh tế chính trị hoặc tư tưởng","B":"Khả năng sử dụng sức mạnh vũ lực","C":"Khả năng sử dụng biện pháp thuyết phục giáo dục","D":"Việc sử dụng sức mạnh cưỡng chế để quản lý xã hội"},"answer":"D","page":5,"uid":"de6_cau35","quiz":6,"category":"Nhà nước","source":"Đề 6 · Câu 35 · Trang 5","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Việc sử dụng sức mạnh cưỡng chế để quản lý xã hội."}],"count":35},"7":{"id":7,"title":"Đề 7","questions":[{"id":1,"q":"Khẳng định nào là đúng:","options":{"A":"Nguồn của pháp luật nói chung là văn bản quy phạm pháp luật, tập quán pháp và tiền lệ pháp","B":"Nguồn của pháp luật nói chung là văn bản quy phạm pháp luật và tập quán pháp","C":"Nguồn của pháp luật nói chung chỉ là văn bản quy phạm pháp luật","D":"Cả ba khẳng định trên đều sai"},"answer":"A","page":1,"uid":"de7_cau1","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 1 · Trang 1","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Nguồn của pháp luật nói chung là văn bản quy phạm pháp luật, tập quán pháp và tiền lệ pháp."},{"id":2,"q":"Các quy tắc xử sự nào sau đây là quy phạm pháp luật:","options":{"A":"Những quy tắc xử sự bắt buộc trong tôn giáo","B":"Các chuẩn mực ứng xử chung giữa người với người trong cuộc sống xã hội được cộng đồng thừa nhận và tôn trọng","C":"Những quy tắc được hình thành lâu đời được cộng đồng thừa nhận","D":"Những quy tắc xử sự được nhà nước ban hành hoặc thừa nhận và đảm bảo thực hiện"},"answer":"D","page":1,"uid":"de7_cau2","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 2 · Trang 1","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Những quy tắc xử sự được nhà nước ban hành hoặc thừa nhận và đảm bảo thực hiện."},{"id":3,"q":"Quy phạm pháp luật là quy tắc xử sự mang tính... do... ban hành và đảm bảo thực hiện thể hiện ý chí và bảo vệ lợi ích của giai cấp thống trị để điều chỉnh các...","options":{"A":"bắt buộc chung, nhà nước, quan hệ pháp luật","B":"bắt buộc chung, nhà nước, quan hệ xã hội","C":"bắt buộc chung, quốc hội, quan hệ xã hội","D":"bắt buộc, nhà nước, quan hệ xã hội"},"answer":"B","page":1,"uid":"de7_cau3","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 3 · Trang 1","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án B: bắt buộc chung, nhà nước, quan hệ xã hội."},{"id":4,"q":"Quy phạm pháp luật là cách xử sự do nhà nước quy định để:","options":{"A":"Áp dụng trong một hoàn cảnh cụ thể","B":"Áp dụng trong nhiều hoàn cảnh","C":"Cả hai đáp án trên đều đúng","D":"Cả hai đáp án trên đều sai"},"answer":"B","page":1,"uid":"de7_cau4","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 4 · Trang 1","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án B: Áp dụng trong nhiều hoàn cảnh."},{"id":5,"q":"Quy phạm pháp luật bắt nguồn từ đâu:","options":{"A":"Từ ý thức của các cá nhân trong xã hội","B":"Từ tư duy trừu tượng của con người","C":"Từ thực tiễn đời sống xã hội","D":"Từ quyền lực của giai cấp thống trị"},"answer":"C","page":1,"uid":"de7_cau5","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 5 · Trang 1","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Từ thực tiễn đời sống xã hội."},{"id":6,"q":"Quy phạm pháp luật là cách xử sự do nhà nước quy định để:","options":{"A":"Áp dụng cho một lần duy nhất và vẫn còn hiệu lực sau lần áp dụng đó","B":"Áp dụng cho nhiều lần và hết hiệu lực sau những lần áp dụng đó","C":"Áp dụng cho một lần duy nhất và hết hiệu lực sau lần áp dụng đó","D":"Áp dụng cho nhiều lần và vẫn còn hiệu lực sau những lần áp dụng đó"},"answer":"D","page":1,"uid":"de7_cau6","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 6 · Trang 1","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Áp dụng cho nhiều lần và vẫn còn hiệu lực sau những lần áp dụng đó."},{"id":7,"q":"Tính xác định chặt chẽ về mặt hình thức là thuộc tính của:","options":{"A":"Tôn giáo","B":"Pháp luật","C":"Đạo đức","D":"Tập quán"},"answer":"B","page":2,"uid":"de7_cau7","quiz":7,"category":"Lý luận chung về pháp luật","source":"Đề 7 · Câu 7 · Trang 2","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án B: Pháp luật."},{"id":8,"q":"Nguồn chủ yếu của hệ thống pháp luật Việt Nam:","options":{"A":"Tập quán pháp","B":"Tiền lệ tư pháp","C":"Tiền lệ pháp","D":"Văn bản quy phạm pháp luật"},"answer":"D","page":2,"uid":"de7_cau8","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 8 · Trang 2","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Văn bản quy phạm pháp luật."},{"id":9,"q":"Bộ phận giả định của quy phạm pháp luật có ý nghĩa:","options":{"A":"Nêu rõ hoàn cảnh, điều kiện cụ thể của cuộc sống mà khi xuất hiện, cá nhân, tổ chức không phải xử sự theo quy định của Nhà nước","B":"Nêu rõ hoàn cảnh, điều kiện cụ thể của cuộc sống mà khi xuất hiện, cá nhân, tổ chức ở vào hoàn cảnh này phải xử sự theo quy định của Nhà nước","C":"Nêu rõ hoàn cảnh, điều kiện không cụ thể của cuộc sống mà khi xuất hiện, cá nhân, tổ chức phải xử sự theo quy định của Nhà nước","D":"Nêu rõ cách (quy tắc) xử sự mà mọi chủ thể phải xử sự theo khi họ ở vào hoàn cảnh đã nêu"},"answer":"B","page":2,"uid":"de7_cau9","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 9 · Trang 2","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án B: Nêu rõ hoàn cảnh, điều kiện cụ thể của cuộc sống mà khi xuất hiện, cá nhân, tổ chức ở vào hoàn cảnh này phải xử sự theo quy định của Nhà nước."},{"id":10,"q":"Bộ phận quy định của quy phạm pháp luật có ý nghĩa:","options":{"A":"Nêu biện pháp xử lý dự kiến sẽ được áp dụng đối với người làm trái quy định","B":"Nêu rõ hoàn cảnh, điều kiện không cụ thể của cuộc sống","C":"Nêu rõ cách (quy tắc) xử sự mà mọi chủ thể (cá nhân, tổ chức) phải xử sự theo khi họ ở vào hoàn cảnh đã nêu trong phần giả định","D":"Nêu rõ hoàn cảnh, điều kiện cụ thể của cuộc sống để chịu sự điều chỉnh của pháp luật"},"answer":"C","page":2,"uid":"de7_cau10","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 10 · Trang 2","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Nêu rõ cách (quy tắc) xử sự mà mọi chủ thể (cá nhân, tổ chức) phải xử sự theo khi họ ở vào hoàn cảnh đã nêu trong phần giả định."},{"id":11,"q":"Bộ phận chế tài có ý nghĩa:","options":{"A":"Nêu rõ hoàn cảnh, điều kiện cụ thể của cuộc sống để cá nhân, tổ chức xử sự theo quy định","B":"Nêu rõ hoàn cảnh, điều kiện không cụ thể của cuộc sống","C":"Nêu rõ cách (quy tắc) xử sự mà mọi chủ thể phải tuân theo","D":"Nêu biện pháp xử lý dự kiến sẽ được áp dụng đối với người xử sự không đúng hoặc làm trái quy định của nhà nước"},"answer":"D","page":2,"uid":"de7_cau11","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 11 · Trang 2","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Nêu biện pháp xử lý dự kiến sẽ được áp dụng đối với người xử sự không đúng hoặc làm trái quy định của nhà nước."},{"id":12,"q":"Có mấy loại chế tài:","options":{"A":"2 loại: chế tài dân sự, chế tài kỉ luật.","B":"3 loại: chế tài hình sự, chế tài hành chính, chế tài dân sự.","C":"2 loại: chế tài hình sự, chế tài hành chính.","D":"4 loại: chế tài hình sự, chế tài hành chính, chế tài dân sự, chế tài kỉ luật."},"answer":"D","page":2,"uid":"de7_cau12","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 12 · Trang 2","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: 4 loại: chế tài hình sự, chế tài hành chính, chế tài dân sự, chế tài kỉ luật.."},{"id":13,"q":"Chế tài của quy phạm pháp luật là:","options":{"A":"Tất cả các đáp án còn lại đều đúng","B":"Biện pháp cưỡng chế mà nhà nước áp dụng đối với người vi phạm pháp luật","C":"Những hậu quả bất lợi có thể áp dụng đối với người không thực hiện hoặc thực hiện không đúng","D":"Hình phạt nghiêm khắc của nhà nước đối với người có hành vi vi phạm pháp luật"},"answer":"A","page":3,"uid":"de7_cau13","quiz":7,"category":"Luật hình sự","source":"Đề 7 · Câu 13 · Trang 3","hint":"Nhớ dấu hiệu tội phạm, hình phạt và trách nhiệm hình sự.","explanation":"Đáp án A: Tất cả các đáp án còn lại đều đúng."},{"id":14,"q":"Phần tử nhỏ nhất của hệ thống pháp luật Việt Nam là:","options":{"A":"Cả điều luật và quy phạm pháp luật","B":"Tất cả đều sai","C":"Quy phạm pháp luật","D":"Điều luật"},"answer":"C","page":3,"uid":"de7_cau14","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 14 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Quy phạm pháp luật."},{"id":15,"q":"Việc kết hôn phải được đăng kí tại cơ quan nhà nước có thẩm quyền, mọi hình thức kết hôn khác đều không có giá trị về mặt pháp lý. Quy phạm pháp luật này gồm có mấy bộ phận:","options":{"A":"4","B":"1","C":"3","D":"2"},"answer":"D","page":3,"uid":"de7_cau15","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 15 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: 2."},{"id":16,"q":"Dòng họ Civil Law còn có tên gọi khác là gì:","options":{"A":"Hệ thống pháp luật Anh - Mỹ","B":"Hệ thống pháp luật Châu Mỹ Lục địa","C":"Hệ thống pháp luật Châu Âu Lục địa","D":"Hệ thống pháp luật Hồi Giáo"},"answer":"C","page":3,"uid":"de7_cau16","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 16 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Hệ thống pháp luật Châu Âu Lục địa."},{"id":17,"q":"Nguồn chủ yếu của hệ thống pháp luật Civil Law là:","options":{"A":"Luật thành văn (Văn bản quy phạm pháp luật)","B":"Các học thuyết pháp lý","C":"Tập quán pháp","D":"Án lệ"},"answer":"A","page":3,"uid":"de7_cau17","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 17 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Luật thành văn (Văn bản quy phạm pháp luật)."},{"id":18,"q":"Ngành luật kinh tế bao gồm hệ thống các quy phạm pháp luật:","options":{"A":"Tất cả các đáp án còn lại đều đúng","B":"Điều chỉnh các quan hệ xã hội phát sinh trong quá trình tổ chức quản lý và hoạt động sản xuất kinh doanh giữa các doanh nghiệp với nhau","C":"Điều chỉnh các quan hệ xã hội giữa các doanh nghiệp với các cơ quan quản lý nhà nước về kinh tế","D":"Do nhà nước ban hành hoặc thừa nhận"},"answer":"A","page":3,"uid":"de7_cau18","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 18 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Tất cả các đáp án còn lại đều đúng."},{"id":19,"q":"Nguồn của luật kinh tế bao gồm:","options":{"A":"Văn bản quy phạm pháp luật và tập quán thương mại","B":"Văn bản quy phạm pháp luật","C":"Tập quán thương mại","D":"Tất cả các đáp án trên đều đúng"},"answer":"A","page":3,"uid":"de7_cau19","quiz":7,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 7 · Câu 19 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Văn bản quy phạm pháp luật và tập quán thương mại."},{"id":20,"q":"Tư cách pháp nhân để chỉ:","options":{"A":"Tư cách chủ thể pháp nhân của cá nhân","B":"Tư cách chủ thể pháp luật của tổ chức","C":"Tư cách chủ thể pháp luật của cá nhân tổ chức","D":"Tất cả các phương án trên đều sai"},"answer":"B","page":4,"uid":"de7_cau20","quiz":7,"category":"Luật dân sự","source":"Đề 7 · Câu 20 · Trang 4","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án B: Tư cách chủ thể pháp luật của tổ chức."},{"id":21,"q":"Hành vi của pháp nhân được thực hiện bởi ai:","options":{"A":"Người điều hành hoạt động của pháp nhân","B":"Người đại diện theo pháp luật của pháp nhân","C":"Người quản lý pháp nhân","D":"Người ủy quyền quản lý pháp nhân"},"answer":"B","page":4,"uid":"de7_cau21","quiz":7,"category":"Luật dân sự","source":"Đề 7 · Câu 21 · Trang 4","hint":"Chú ý nguyên tắc bình đẳng, tự nguyện và các quan hệ tài sản, nhân thân.","explanation":"Đáp án B: Người đại diện theo pháp luật của pháp nhân."},{"id":22,"q":"Nhà nước nào sau đây có hình thức cấu trúc nhà nước liên bang:","options":{"A":"Cả Việt Nam và Pháp","
