","hint":"Phân biệt tuân thủ, thi hành, sử dụng, áp dụng và các loại trách nhiệm.","explanation":"Đáp án B: Cả ba phương án còn lại đều đúng."},{"id":9,"q":"Nhà nước có chủ quyền quốc gia là:","options":{"A":"Quyền độc lập trong quan hệ quốc tế","B":"Quyền bất khả xâm phạm về lãnh thổ","C":"Quyền tự quyết về vấn đề đối nội đất nước","D":"Tất cả các ý trên đều đúng"},"answer":"D","page":2,"uid":"de8_cau9","quiz":8,"category":"Nhà nước","source":"Đề 8 · Câu 9 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Tất cả các ý trên đều đúng."},{"id":10,"q":"Nhà nước có vai trò đối với nền kinh tế:","options":{"A":"Nó quyết định nội dung và tính chất của cơ sở kinh tế","B":"Không có vai trò gì đối với cơ sở kinh tế","C":"Nó tác động trở lại đối với cơ sở kinh tế","D":"Nó thúc đẩy cơ sở kinh tế phát triển nếu như nó tiến bộ"},"answer":"C","page":2,"uid":"de8_cau10","quiz":8,"category":"Nhà nước","source":"Đề 8 · Câu 10 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Nó tác động trở lại đối với cơ sở kinh tế."},{"id":11,"q":"Trong hệ thống pháp luật Việt Nam, để được coi là một ngành luật độc lập khi:","options":{"A":"Ngành luật đó phải có phương pháp điều chỉnh","B":"Ngành luật đó phải có đầy đủ các văn bản quy phạm pháp luật","C":"Ngành luật đó phải có đối tượng điều chỉnh","D":"Ngành luật đó phải có đối tượng điều chỉnh và phương pháp điều chỉnh"},"answer":"D","page":2,"uid":"de8_cau11","quiz":8,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 8 · Câu 11 · Trang 2","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Ngành luật đó phải có đối tượng điều chỉnh và phương pháp điều chỉnh."},{"id":12,"q":"Văn bản có giá trị pháp lý cao nhất trong hệ thống các văn bản pháp luật:","options":{"A":"Hiến pháp","B":"Bộ Luật của Quốc hội","C":"Nghị quyết của Quốc hội","D":"Thông tư của Bộ trưởng"},"answer":"A","page":2,"uid":"de8_cau12","quiz":8,"category":"Hình thức và nguồn pháp luật","source":"Đề 8 · Câu 12 · Trang 2","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án A: Hiến pháp."},{"id":13,"q":"Sắp xếp theo thứ tự nhỏ dần của hình thức bên trong của pháp luật:","options":{"A":"Quy phạm pháp luật, hệ thống pháp luật, ngành luật, chế định luật","B":"Ngành luật, quy phạm pháp luật, hệ thống pháp luật, ngành luật","C":"Hệ thống pháp luật, ngành luật, chế định luật, quy phạm pháp luật","D":"Chế định pháp luật, quy phạm pháp luật, hệ thống pháp luật, ngành luật"},"answer":"C","page":2,"uid":"de8_cau13","quiz":8,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 8 · Câu 13 · Trang 2","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Hệ thống pháp luật, ngành luật, chế định luật, quy phạm pháp luật."},{"id":14,"q":"Uỷ ban thường vụ quốc hội ban hành những văn bản pháp luật nào:","options":{"A":"Pháp lệnh, nghị quyết","B":"Nghị quyết","C":"Pháp lệnh","D":"Nghị định"},"answer":"A","page":3,"uid":"de8_cau14","quiz":8,"category":"Hình thức và nguồn pháp luật","source":"Đề 8 · Câu 14 · Trang 3","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án A: Pháp lệnh, nghị quyết."},{"id":15,"q":"Hội đồng nhân dân các cấp có quyền ban hành văn bản quy phạm pháp luật gì:","options":{"A":"Pháp lệnh, nghị quyết","B":"Nghị quyết","C":"Hiến pháp","D":"Pháp lệnh"},"answer":"B","page":3,"uid":"de8_cau15","quiz":8,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 8 · Câu 15 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án B: Nghị quyết."},{"id":16,"q":"Văn bản nào sau đây không phải là văn bản quy phạm pháp luật:","options":{"A":"Thông tư của Bộ trưởng","B":"Luật, bộ luật của Quốc hội","C":"Chỉ thị của Thủ tướng","D":"Lệnh của Chủ tịch nước"},"answer":"C","page":3,"uid":"de8_cau16","quiz":8,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 8 · Câu 16 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Chỉ thị của Thủ tướng."},{"id":17,"q":"Bộ trưởng được ban hành văn bản nào sau đây:","options":{"A":"Thông tư","B":"Nghị quyết","C":"Nghị định","D":"Luật giáo dục đại học"},"answer":"A","page":3,"uid":"de8_cau17","quiz":8,"category":"Hình thức và nguồn pháp luật","source":"Đề 8 · Câu 17 · Trang 3","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án A: Thông tư."},{"id":18,"q":"Pháp lệnh là văn bản do cơ quan nào ban hành:","options":{"A":"Quốc hội","B":"Chính phủ","C":"Uỷ ban Thường vụ Quốc hội","D":"Cả ba phương án còn lại đều đúng"},"answer":"C","page":3,"uid":"de8_cau18","quiz":8,"category":"Hình thức và nguồn pháp luật","source":"Đề 8 · Câu 18 · Trang 3","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án C: Uỷ ban Thường vụ Quốc hội."},{"id":19,"q":"Chính phủ được ban hành văn bản quy phạm pháp luật nào:","options":{"A":"Pháp lệnh","B":"Hiến pháp","C":"Nghị định, nghị quyết","D":"Nghị quyết"},"answer":"C","page":3,"uid":"de8_cau19","quiz":8,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 8 · Câu 19 · Trang 3","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Nghị định, nghị quyết."},{"id":20,"q":"Tập quán pháp là gì:","options":{"A":"Tập quán được lưu truyền trong xã hội","B":"Phù hợp với lợi ích của nhà nước với thực tiễn cuộc sống","C":"Tập quán được nhà nước thừa nhận trở thành pháp luật","D":"Cả 3 phương án trên"},"answer":"B","page":3,"uid":"de8_cau20","quiz":8,"category":"Hình thức và nguồn pháp luật","source":"Đề 8 · Câu 20 · Trang 3","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án B: Phù hợp với lợi ích của nhà nước với thực tiễn cuộc sống."},{"id":21,"q":"Tiền lệ pháp là gì (án lệ):","options":{"A":"Là việc nhà nước thừa nhận những bản án những quyết định của cơ quan hành chính, của toà án khi giải quyết những vụ việc cụ thể để áp dụng cho những vụ việc tương tự về sau","B":"Là việc nhà nước thừa nhận những bản án những quyết định của toà án khi giải quyết những vụ việc cụ thể để áp dụng cho những vụ việc tương tự về sau","C":"Là việc nhà nước thừa nhận những bản án những quyết định của cơ quan hành chính khi giải quyết những vụ việc cụ thể để áp dụng cho những vụ việc tương tự về sau","D":"Là việc nhà nước thừa nhận những bản án những quyết định của cơ quan nhà nước có thẩm quyền khi giải quyết những vụ việc cụ thể để áp dụng cho những vụ việc tương tự về sau"},"answer":"A","page":3,"uid":"de8_cau21","quiz":8,"category":"Hình thức và nguồn pháp luật","source":"Đề 8 · Câu 21 · Trang 3","hint":"Chú ý cơ quan ban hành, loại văn bản, hiệu lực và nguồn pháp luật.","explanation":"Đáp án A: Là việc nhà nước thừa nhận những bản án những quyết định của cơ quan hành chính, của toà án khi giải quyết những vụ việc cụ thể để áp dụng cho những vụ việc tương tự về sau."},{"id":22,"q":"Văn bản quy phạm pháp luật được áp dụng từ thời điểm nào:","options":{"A":"Bắt đầu có hiệu lực","B":"Thời điểm thông qua","C":"Thời điểm ký ban hành","D":"Thời điểm đăng thông báo"},"answer":"A","page":4,"uid":"de8_cau22","quiz":8,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 8 · Câu 22 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Bắt đầu có hiệu lực."},{"id":23,"q":"Văn bản quy phạm pháp luật là:","options":{"A":"Chứa đựng các quy tắc xử sự mang tính bắt buộc chung được nhà nước đảm bảo thực hiện","B":"Áp dụng nhiều lần trong thực tế cuộc sống","C":"Cả ba phương án A, B và C","D":"Văn bản do cơ quan nhà nước có thẩm quyền ban hành"},"answer":"C","page":4,"uid":"de8_cau23","quiz":8,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 8 · Câu 23 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Cả ba phương án A, B và C."},{"id":24,"q":"Khẳng định nào sau đây là đúng:","options":{"A":"Tổ chức xã hội chỉ có quyền ban hành pháp luật khi được nhà nước trao quyền","B":"Cả A và C","C":"Không chỉ có nhà nước mà các tổ chức xã hội cũng có quyền ban hành pháp luật","D":"Chỉ có nhà nước mới có quyền ban hành pháp luật"},"answer":"D","page":4,"uid":"de8_cau24","quiz":8,"category":"Nhà nước","source":"Đề 8 · Câu 24 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Chỉ có nhà nước mới có quyền ban hành pháp luật."},{"id":25,"q":"Chế định pháp luật là gì:","options":{"A":"Là một nhóm các Quy phạm pháp luật điều chỉnh một nhóm Quan hệ xã hội cùng loại","B":"Là văn bản do cơ quan nhà nước có thẩm quyền ban hành, chứa đựng các quy tắc xử sự mang tính bắt buộc chung được nhà nước đảm bảo thực hiện","C":"Cả ba phương án còn lại đều đúng","D":"Là một nhóm các Quy phạm pháp luật điều chỉnh một nhóm quan hệ xã hội cùng loại, có tính chất nội tại trong một ngành luật"},"answer":"D","page":4,"uid":"de8_cau25","quiz":8,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 8 · Câu 25 · Trang 4","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Là một nhóm các Quy phạm pháp luật điều chỉnh một nhóm quan hệ xã hội cùng loại, có tính chất nội tại trong một ngành luật."},{"id":26,"q":"Bản chất của pháp luật bao gồm:","options":{"A":"Tính quy phạm và bắt buộc chung","B":"Cả 3 phương án trên","C":"Tính giai cấp và tính xã hội","D":"Tính giáo dục, thuyết phục và cưỡng chế"},"answer":"C","page":4,"uid":"de8_cau26","quiz":8,"category":"Nhà nước","source":"Đề 8 · Câu 26 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Tính giai cấp và tính xã hội."},{"id":27,"q":"Khi nghiên cứu về nguồn gốc Nhà nước, thì khẳng định nào sau đây là sai:","options":{"A":"Nhà nước là hiện tượng xã hội mang tính lịch sử","B":"Nhà nước ra đời, tồn tại cùng với lịch sử xã hội loài người","C":"Thời kì xã hội loài người chưa có giai cấp, thì nhà nước chưa xuất hiện","D":"Nhà nước ra đời, tồn tại trong xã hội có giai cấp"},"answer":"B","page":4,"uid":"de8_cau27","quiz":8,"category":"Phòng, chống tham nhũng","source":"Đề 8 · Câu 27 · Trang 4","hint":"Chú ý chủ thể có chức vụ, quyền hạn và mục đích vụ lợi.","explanation":"Đáp án B: Nhà nước ra đời, tồn tại cùng với lịch sử xã hội loài người."},{"id":28,"q":"Nguyên thủ quốc gia của nước Cộng hòa XHCN Việt Nam là:","options":{"A":"Thủ tướng chính phủ","B":"Tổng bí thư","C":"Chủ tịch quốc hội","D":"Chủ tịch nước"},"answer":"D","page":4,"uid":"de8_cau28","quiz":8,"category":"Nhà nước","source":"Đề 8 · Câu 28 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Chủ tịch nước."},{"id":29,"q":"Hội đồng nhân dân các cấp có quyền ban hành loại văn bản quy phạm pháp luật nào:","options":{"A":"Nghị quyết, quyết định","B":"Nghị định","C":"Nghị quyết","D":"Nghị quyết, nghị định"},"answer":"C","page":5,"uid":"de8_cau29","quiz":8,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 8 · Câu 29 · Trang 5","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án C: Nghị quyết."},{"id":30,"q":"Bộ phận giả định trong quy phạm pháp luật sau là: “Người nào quảng cáo gian dối về hàng hóa, dịch vụ gây hậu quả nghiêm trọng đã bị xử phạt hành chính về hành vi này hoặc đã bị kết án về tội này, chưa được xóa án tích mà còn vi phạm thì phạt tiền từ 10 triệu đến 100 triệu đồng, cải tạo không giam giữ đến 3 năm hoặc bị phạt tù từ 6 tháng đến 3 năm.\"","options":{"A":"Người nào quảng cáo gian dối về hàng hóa về dịch vụ","B":"Người nào quảng cáo gian dối về hàng hóa dịch vụ gây hậu quả nghiêm trọng đã bị xử phạt hành chính vì hành vi này","C":"Người nào quảng cáo gian dối về hàng hóa dịch vụ gây hậu quả nghiêm trọng","D":"Người nào quảng cáo gian dối về hàng hóa, dịch vụ gây hậu quả nghiêm trọng đã bị xử phạt hành chính về hành vi này hoặc đã bị kết án vì tội này, chưa được xóa án tích mà còn vi phạm"},"answer":"D","page":5,"uid":"de8_cau30","quiz":8,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 8 · Câu 30 · Trang 5","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án D: Người nào quảng cáo gian dối về hàng hóa, dịch vụ gây hậu quả nghiêm trọng đã bị xử phạt hành chính về hành vi này hoặc đã bị kết án vì tội này, chưa được xóa án tích mà còn vi phạm."}],"count":30},"9":{"id":9,"title":"Đề 9","questions":[{"id":1,"q":"Sáng chế là gì?","options":{"A":"Không có phương án nào đúng","B":"Là giải pháp kỹ thuật có ứng dụng thực tiễn","C":"Là giải pháp kỹ thuật dưới dạng sản phẩm hoặc quy trình nhằm giải quyết một vấn đề xác định bằng việc ứng dụng các quy luật tự nhiên","D":"Là những công trình nghiên cứu phục vụ đời sống con người"},"answer":"C","page":1,"uid":"de9_cau1","quiz":9,"category":"Sở hữu trí tuệ","source":"Đề 9 · Câu 1 · Trang 1","hint":"Phân biệt rõ sáng chế, kiểu dáng, nhãn hiệu và quyền tác giả.","explanation":"Đáp án C: Là giải pháp kỹ thuật dưới dạng sản phẩm hoặc quy trình nhằm giải quyết một vấn đề xác định bằng việc ứng dụng các quy luật tự nhiên."},{"id":2,"q":"Kiểu dáng công nghiệp là gì?","options":{"A":"Không có phương án nào đúng","B":"Là những thuộc tính tồn tại bên trong vật thể","C":"Là kiểu dáng bên ngoài sản phẩm được thể hiện bằng hình khối, đường nét, màu sắc hoặc sự kết hợp giữa các yếu tố này","D":"Là bề ngoài của vật thể"},"answer":"C","page":1,"uid":"de9_cau2","quiz":9,"category":"Sở hữu trí tuệ","source":"Đề 9 · Câu 2 · Trang 1","hint":"Phân biệt rõ sáng chế, kiểu dáng, nhãn hiệu và quyền tác giả.","explanation":"Đáp án C: Là kiểu dáng bên ngoài sản phẩm được thể hiện bằng hình khối, đường nét, màu sắc hoặc sự kết hợp giữa các yếu tố này."},{"id":3,"q":"Nhãn hiệu là gì?","options":{"A":"Là dấu hiệu dùng để phân biệt hàng hoá, dịch vụ của các tổ chức, cá nhân khác nhau","B":"Là hình ảnh đại diện cho công ty, tổ chức","C":"Là biểu tượng của tổ chức, cá nhân","D":"Là hoạt động trao đổi buôn bán hàng hoá và dịch vụ giữa hai hay nhiều bên với nhau"},"answer":"A","page":1,"uid":"de9_cau3","quiz":9,"category":"Sở hữu trí tuệ","source":"Đề 9 · Câu 3 · Trang 1","hint":"Phân biệt rõ sáng chế, kiểu dáng, nhãn hiệu và quyền tác giả.","explanation":"Đáp án A: Là dấu hiệu dùng để phân biệt hàng hoá, dịch vụ của các tổ chức, cá nhân khác nhau."},{"id":4,"q":"Khi nghiên cứu về nhà nước và pháp luật thì nó gắn liền với phương pháp nghiên cứu nào","options":{"A":"Trực quan sinh động","B":"Duy vật lịch sử","C":"Duy vật biện chứng","D":"Duy vật biện chứng và duy vật lịch sử"},"answer":"D","page":1,"uid":"de9_cau4","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 4 · Trang 1","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Duy vật biện chứng và duy vật lịch sử."},{"id":5,"q":"Môn học Pháp luật đại cương thuộc lĩnh vực nào của khoa học xã hội","options":{"A":"Khoa học kinh tế","B":"Khoa học văn hoá","C":"Khoa học tâm lý","D":"Khoa học chính trị - pháp lý"},"answer":"D","page":1,"uid":"de9_cau5","quiz":9,"category":"Nhập môn pháp luật đại cương","source":"Đề 9 · Câu 5 · Trang 1","hint":"Nhớ phạm vi, nội dung và phương pháp nghiên cứu của môn học.","explanation":"Đáp án D: Khoa học chính trị - pháp lý."},{"id":6,"q":"Trong lĩnh vực nghiên cứu khoa học pháp lý, pháp luật đại cương là","options":{"A":"Nghiên cứu những vấn đề nền tảng cốt lõi của nhà nước và pháp luật","B":"Nghiên cứu về một nhà nước pháp luật cụ thể","C":"Nghiên cứu về một kiểu nhà nước kiểu pháp luật cụ thể","D":"Nghiên cứu về một hệ thống pháp luật của nhà nước"},"answer":"A","page":1,"uid":"de9_cau6","quiz":9,"category":"Hệ thống, quy phạm và quan hệ pháp luật","source":"Đề 9 · Câu 6 · Trang 1","hint":"Xác định đúng chủ thể, khách thể, nội dung và cấu trúc quy phạm.","explanation":"Đáp án A: Nghiên cứu những vấn đề nền tảng cốt lõi của nhà nước và pháp luật."},{"id":7,"q":"Khi nghiên cứu về pháp luật đại cương liên quan tới các lĩnh vực xã hội nào","options":{"A":"Lĩnh vực về tư tưởng","B":"Lĩnh vực về kinh tế","C":"Lĩnh vực về văn hoá","D":"Tất cả các lĩnh vực đã nêu"},"answer":"D","page":2,"uid":"de9_cau7","quiz":9,"category":"Lý luận chung về pháp luật","source":"Đề 9 · Câu 7 · Trang 2","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án D: Tất cả các lĩnh vực đã nêu."},{"id":8,"q":"Mục đích ra đời của nhà nước nhằm","options":{"A":"Bảo vệ lợi ích của người đứng đầu","B":"Bảo vệ duy trì lặp lại trật tự xã hội","C":"Cả hai phương án trên đều sai","D":"Cả hai phương án trên đều đúng"},"answer":"B","page":2,"uid":"de9_cau8","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 8 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Bảo vệ duy trì lặp lại trật tự xã hội."},{"id":9,"q":"Đâu là chức năng đối nội của nhà nước","options":{"A":"Phát triển quan hệ với các quốc gia khác","B":"Giáo dục ý thức của người dân trong xã hội","C":"Chống sự xâm lược từ bên ngoài","D":"Bảo vệ chế độ kinh tế đất nước"},"answer":"D","page":2,"uid":"de9_cau9","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 9 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Bảo vệ chế độ kinh tế đất nước."},{"id":10,"q":"Chức năng của nhà nước là thực hiện các nhiệm vụ của nhà nước trong phạm vi","options":{"A":"Thực hiện những công việc trong phạm vi lãnh thổ quốc gia và những công việc của nhà nước vượt ra ngoài phạm vi lãnh thổ quốc gia","B":"Thực hiện chính sách đối nội hoặc đối ngoại","C":"Thực hiện chính sách đối nội của nhà nước","D":"Thực hiện chính sách đối ngoại"},"answer":"A","page":2,"uid":"de9_cau10","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 10 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Thực hiện những công việc trong phạm vi lãnh thổ quốc gia và những công việc của nhà nước vượt ra ngoài phạm vi lãnh thổ quốc gia."},{"id":11,"q":"Trấn áp phần tử chống đối chế độ là dấu hiệu thuộc về chức năng nào của nhà nước","options":{"A":"Tất cả phương án đều sai","B":"Chức năng đối nội","C":"Chức năng đối nội hoặc chức năng đối ngoại","D":"Chức năng đối ngoại"},"answer":"B","page":2,"uid":"de9_cau11","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 11 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Chức năng đối nội."},{"id":12,"q":"Đâu là chức năng đối ngoại của nhà nước","options":{"A":"Thiết lập quan hệ với các quốc gia bên ngoài và phòng thủ đất nước","B":"Thiết lập quan hệ với các quốc gia bên ngoài","C":"Phòng thủ đất nước","D":"Bảo vệ chế độ kinh tế"},"answer":"A","page":2,"uid":"de9_cau12","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 12 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Thiết lập quan hệ với các quốc gia bên ngoài và phòng thủ đất nước."},{"id":13,"q":"Bộ phận tạo thành bộ máy nhà nước","options":{"A":"Cơ quan luật pháp","B":"Cơ quan hành pháp","C":"Cơ quan nhà nước","D":"Tất cả các cơ quan trên"},"answer":"C","page":2,"uid":"de9_cau13","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 13 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Cơ quan nhà nước."},{"id":14,"q":"Hệ thống cơ quan trong bộ máy nhà nước bao gồm mấy hệ thống","options":{"A":"Cơ quan lập pháp, cơ quan hành pháp và cơ quan tư pháp","B":"Cơ quan hành pháp","C":"Cơ quan lập pháp","D":"Cơ quan tư pháp"},"answer":"A","page":2,"uid":"de9_cau14","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 14 · Trang 2","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Cơ quan lập pháp, cơ quan hành pháp và cơ quan tư pháp."},{"id":15,"q":"Học thuyết được một số quốc gia trên thế giới áp dụng trong việc tổ chức bộ máy nhà nước là học thuyết nào","options":{"A":"Thuyết hàn phi tử","B":"Thuyết tam quyền phân lập","C":"Thuyết bạo lực","D":"Thuyết khế ước xã hội"},"answer":"B","page":3,"uid":"de9_cau15","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 15 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Thuyết tam quyền phân lập."},{"id":16,"q":"Toà án thuộc hệ thống cơ quan nào trong nhà nước","options":{"A":"Tư pháp","B":"Hành pháp","C":"Luật pháp","D":"Cả ba hệ thống nêu trên"},"answer":"A","page":3,"uid":"de9_cau16","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 16 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Tư pháp."},{"id":17,"q":"Ủy ban nhân dân các cấp nằm trong hệ thống cơ quan nào trong bộ máy nhà nước","options":{"A":"Cơ quan hành chính","B":"Cơ quan đại diện nhân dân","C":"Cơ quan luật pháp","D":"Cơ quan xét xử"},"answer":"A","page":3,"uid":"de9_cau17","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 17 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Cơ quan hành chính."},{"id":18,"q":"Chính phủ là cơ quan nhà nước do","options":{"A":"Cơ quan không do người dân trực tiếp bầu ra","B":"Người dân trực tiếp bầu ra","C":"Việc thành lập bởi nguyên thủ quốc gia","D":"Tòa án bầu ra"},"answer":"A","page":3,"uid":"de9_cau18","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 18 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: Cơ quan không do người dân trực tiếp bầu ra."},{"id":19,"q":"Nguyên thủ quốc gia trong chính thể cộng hòa đại nghị do","options":{"A":"Do người dân cả nước bầu ra","B":"Do nghị viện quốc hội bầu ra","C":"Tất cả các đáp án trên đều đúng","D":"Do nhân dân địa phương bầu ra"},"answer":"B","page":3,"uid":"de9_cau19","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 19 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Do nghị viện quốc hội bầu ra."},{"id":20,"q":"Các bộ là cơ quan nhà nước thuộc","options":{"A":"Ủy ban nhân dân","B":"Quốc hội","C":"Chính phủ","D":"Tòa án"},"answer":"C","page":3,"uid":"de9_cau20","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 20 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Chính phủ."},{"id":21,"q":"Tổ chức bộ máy nhà nước cộng hòa xã hội nói chung, bộ máy nhà nước cộng hòa xã hội chủ nghĩa Việt Nam nói riêng tuân theo nguyên tắc gì","options":{"A":"Quyền lực nhà nước được giao cho các cơ quan độc lập đảm nhiệm để thực hiện quyền lập pháp, hành pháp và tư pháp","B":"Quyền lực nhà nước thống nhất, tất cả quyền lực nhà nước thuộc về nhân dân","C":"A, B sai","D":"Tất cả đều đúng"},"answer":"B","page":3,"uid":"de9_cau21","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 21 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án B: Quyền lực nhà nước thống nhất, tất cả quyền lực nhà nước thuộc về nhân dân."},{"id":22,"q":"Trong bộ máy nhà nước cộng hòa xã hội chủ nghĩa Việt Nam, hội đồng nhân dân các cấp là","options":{"A":"Cơ quan của quốc hội ở địa phương","B":"Cơ quan kiêm nhiệm ở địa phương","C":"Cơ quan luật pháp","D":"Cơ quan đại diện quyền lực cao nhất ở địa phương"},"answer":"D","page":3,"uid":"de9_cau22","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 22 · Trang 3","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án D: Cơ quan đại diện quyền lực cao nhất ở địa phương."},{"id":23,"q":"Khi quy định mỗi cơ quan nhà nước có một thẩm quyền nhất định có nghĩa là","options":{"A":"Cơ quan nhà nước có quyền làm những công việc không thuộc nhiệm vụ của cơ quan mình","B":"Cơ quan nhà nước được sử dụng quyền lực nhà nước ở bất kỳ công việc nào","C":"Cơ quan nhà nước chỉ được làm những gì mà pháp luật quy định","D":"Cơ quan nhà nước không được nhân danh nhà nước khi làm nhiệm vụ"},"answer":"C","page":4,"uid":"de9_cau23","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 23 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Cơ quan nhà nước chỉ được làm những gì mà pháp luật quy định."},{"id":24,"q":"Khi thực hiện chức năng xét xử, toà án nhân danh ai để xét xử","options":{"A":"Cơ quan có thẩm quyền","B":"Quốc hội","C":"Nhà nước","D":"Uỷ ban nhân dân"},"answer":"C","page":4,"uid":"de9_cau24","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 24 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án C: Nhà nước."},{"id":25,"q":"Bộ máy nhà nước Việt Nam được thành lập ở mấy cấp","options":{"A":"4","B":"2","C":"3","D":"1"},"answer":"A","page":4,"uid":"de9_cau25","quiz":9,"category":"Nhà nước","source":"Đề 9 · Câu 25 · Trang 4","hint":"Xác định bản chất, hình thức, bộ máy, chức năng và dấu hiệu của nhà nước.","explanation":"Đáp án A: 4."},{"id":26,"q":"Chức năng nào sau đây không phải là chức năng của pháp luật","options":{"A":"Chức năng giáo dục","B":"Chức năng điều chỉnh các quan hệ xã hội","C":"Chức năng bảo vệ các quan hệ xã hội","D":"Chức năng xây dựng các quan hệ xã hội"},"answer":"D","page":4,"uid":"de9_cau26","quiz":9,"category":"Lý luận chung về pháp luật","source":"Đề 9 · Câu 26 · Trang 4","hint":"Phân biệt bản chất, thuộc tính và chức năng của pháp luật.","explanation":"Đáp án D: Chức năng xây dựng các quan hệ xã hội."},{"id":27,"q":"Quy ph function shuffle(array){
  const result=[...array];
  for(let i=result.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [result[i],result[j]]=[result[j],result[i]];
  }
  return result;
}
function formatTime(milliseconds){
  const total=Math.max(0,Math.floor(milliseconds/1000));
  const minutes=Math.floor(total/60);
  const seconds=total%60;
  return `${String(minutes).padStart(2,"0")}:${String(seconds).padStart(2,"0")}`;
}
function readStats(quizId){
  try{
    const parsed=JSON.parse(localStorage.getItem(STORAGE_PREFIX+quizId)||"{}");
    return {
      attempts:Number(parsed.attempts)||0,
      bestTime:Number(parsed.bestTime)||0,
      bestScore:Number(parsed.bestScore)||0
    };
  }catch(error){
    return {attempts:0,bestTime:0,bestScore:0};
  }
}
function writeStats(quizId,stats){
  try{localStorage.setItem(STORAGE_PREFIX+quizId,JSON.stringify(stats));}catch(error){}
}

function progressStorageKey(quizId){
  return `${STORAGE_PREFIX}progress_${quizId}`;
}
function readProgress(quizId){
  try{
    const saved=JSON.parse(localStorage.getItem(progressStorageKey(quizId))||"null");
    if(
      !saved ||
      !Array.isArray(saved.activeQuestions) ||
      !saved.activeQuestions.length ||
      !Number.isInteger(saved.questionIndex) ||
      saved.questionIndex<0 ||
      saved.questionIndex>=saved.activeQuestions.length
    ){
      return null;
    }
    return {
      activeQuestions:saved.activeQuestions,
      activeScoredCount:Number(saved.activeScoredCount)||0,
      questionIndex:saved.questionIndex,
      score:Number(saved.score)||0,
      selectedAnswer:saved.selectedAnswer||null,
      questionChecked:Boolean(saved.questionChecked),
      wrongAnswers:Array.isArray(saved.wrongAnswers)?saved.wrongAnswers:[],
      elapsedMs:Math.max(0,Number(saved.elapsedMs)||0)
    };
  }catch(error){
    return null;
  }
}
function writeProgress(quizId,progress){
  try{
    localStorage.setItem(progressStorageKey(quizId),JSON.stringify(progress));
  }catch(error){}
}
function clearProgress(quizId){
  try{localStorage.removeItem(progressStorageKey(quizId));}catch(error){}
}
function progressLabel(progress){
  if(!progress)return "";
  const question=progress.activeQuestions[progress.questionIndex];
  if(question&&question.isSpecial)return "Sơn / π";
  const currentNumber=progress.activeQuestions
    .slice(0,progress.questionIndex+1)
    .filter(item=>!item.isSpecial).length;
  return `Câu ${currentNumber}/${progress.activeScoredCount}`;
}
function saveCurrentProgress(){
  if(
    activeQuizId===null ||
    !Array.isArray(activeQuestions) ||
    !activeQuestions.length
  )return;

  writeProgress(activeQuizId,{
    activeQuestions,
    activeScoredCount,
    questionIndex,
    score,
    selectedAnswer,
    questionChecked,
    wrongAnswers,
    elapsedMs:Math.max(0,Date.now()-startedAt)
  });
}

function sampleMixedQuestions(){
  const categories=Object.keys(CATEGORY_DISTRIBUTION);
  const total=categories.reduce((sum,category)=>sum+CATEGORY_DISTRIBUTION[category],0);
  const raw=categories.map(category=>({
    category,
    exact:MIXED_SIZE*CATEGORY_DISTRIBUTION[category]/total
  }));
  const quotas={};
  let allocated=0;
  raw.forEach(item=>{
    quotas[item.category]=Math.floor(item.exact);
    allocated+=quotas[item.category];
  });
  raw.sort((a,b)=>(b.exact-Math.floor(b.exact))-(a.exact-Math.floor(a.exact)));
  for(let i=0;i<MIXED_SIZE-allocated;i++){
    quotas[raw[i%raw.length].category]++;
  }
  const selected=[];
  const used=new Set();
  categories.forEach(category=>{
    const pool=shuffle(UNIQUE_BANK.filter(question=>question.category===category));
    const take=Math.min(quotas[category]||0,pool.length);
    for(let i=0;i<take;i++){
      selected.push(pool[i]);
      used.add(pool[i].uid);
    }
  });
  if(selected.length<MIXED_SIZE){
    const remaining=shuffle(UNIQUE_BANK.filter(question=>!used.has(question.uid)));
    selected.push(...remaining.slice(0,MIXED_SIZE-selected.length));
  }
  return shuffle(selected.slice(0,MIXED_SIZE));
}
function startQuiz(quizId){
  activeQuizId=quizId;
  const meta=MENU_META.find(item=>item.id===quizId);
  const saved=readProgress(quizId);
  const restoring=Boolean(saved);

  if(restoring){
    activeQuestions=saved.activeQuestions;
    activeScoredCount=saved.activeScoredCount;
    questionIndex=saved.questionIndex;
    score=saved.score;
    selectedAnswer=saved.selectedAnswer;
    questionChecked=saved.questionChecked;
    wrongAnswers=saved.wrongAnswers;
    startedAt=Date.now()-saved.elapsedMs;
  }else{
    const baseQuestions=quizId===10
      ?sampleMixedQuestions()
      :shuffle(FIXED_QUIZZES[String(quizId)].questions);
    activeScoredCount=baseQuestions.length;
    activeQuestions=insertSpecialQuestion(baseQuestions);
    questionIndex=0;
    score=0;
    selectedAnswer=null;
    questionChecked=false;
    wrongAnswers=[];
    startedAt=Date.now();
  }

  clearInterval(timerHandle);
  timerHandle=setInterval(()=>{
    liveTime.textContent=formatTime(Date.now()-startedAt);
  },250);

  const stats=readStats(quizId);
  liveScore.textContent=String(score);
  liveTime.textContent=formatTime(Date.now()-startedAt);
  liveBest.textContent=stats.bestTime?formatTime(stats.bestTime):"Chưa có";
  activeQuizTitle.textContent=meta.title;
  activeQuizSubtitle.textContent=restoring
    ?`Tiếp tục từ ${progressLabel(saved)}.`
    :(quizId===10
      ?`${activeScoredCount} câu ngẫu nhiên, không lặp câu tương đương.`
      :`${activeScoredCount} câu, thứ tự câu hỏi được xáo trộn.`);

  menuScreen.classList.add("hidden");
  resultScreen.classList.add("hidden");
  quizScreen.classList.remove("hidden");
  renderQuestion(restoring);

  if(!restoring)saveCurrentProgress();
  window.scrollTo({top:0,behavior:"smooth"});
}
function renderQuestion(restoring=false){
  const question=activeQuestions[questionIndex];

  if(!restoring){
    selectedAnswer=null;
    questionChecked=false;
  }

  const normalQuestionNumber=activeQuestions
    .slice(0,questionIndex+1)
    .filter(item=>!item.isSpecial).length;
  const completedNormalBefore=activeQuestions
    .slice(0,questionIndex)
    .filter(item=>!item.isSpecial).length;

  questionProgress.textContent=question.isSpecial
    ?"Sơn / π"
    :`Câu ${normalQuestionNumber}/${activeScoredCount}`;
  questionCategory.textContent=question.isSpecial?"Sơn / π":question.category;
  questionSource.textContent=question.isSpecial?"Sơn / π":question.source;
  questionText.textContent=question.q;
  progressBar.style.width=`${completedNormalBefore/activeScoredCount*100}%`;

  optionsElement.innerHTML="";
  const currentCorrect=question.isSpecial||selectedAnswer===question.answer;

  Object.entries(question.options).forEach(([letter,text])=>{
    const label=document.createElement("label");
    label.className="option";
    label.innerHTML=`
      <input type="radio" name="answer" value="${letter}">
      <span class="letter">${letter}.</span>
      <span>${text}</span>
    `;

    const input=label.querySelector("input");
    if(selectedAnswer===letter)input.checked=true;

    if(questionChecked){
      input.disabled=true;
      label.classList.add("disabled");
      if(question.isSpecial){
        if(letter===selectedAnswer)label.classList.add("correct");
      }else{
        if(letter===question.answer)label.classList.add("correct");
        if(letter===selectedAnswer&&!currentCorrect)label.classList.add("wrong");
      }
    }

    label.addEventListener("click",()=>{
      if(questionChecked)return;
      selectedAnswer=letter;
      checkButton.disabled=false;
      saveCurrentProgress();
    });
    optionsElement.appendChild(label);
  });

  hintPanel.className="panel hint";
  hintPanel.textContent=question.hint;
  hintButton.textContent="Mở gợi ý";

  if(questionChecked){
    feedbackPanel.className=`panel feedback ${currentCorrect?"good":"bad"} show`;
    feedbackPanel.innerHTML=currentCorrect
      ?(question.isSpecial
        ?`<strong>Đúng</strong><div class="feedback-source">Sơn / π</div>${question.explanation}`
        :`
          <strong>Đúng — đáp án ${question.answer}</strong>
          <div class="feedback-source">${question.source}</div>
          ${question.explanation}
        `)
      :`
        <strong>Sai — bạn chọn ${selectedAnswer}, đáp án đúng là ${question.answer}</strong>
        <div class="feedback-source">${question.source}</div>
        ${question.explanation}
      `;

    hintButton.disabled=true;
    checkButton.classList.add("hidden");
    nextButton.classList.remove("hidden");
    nextButton.textContent=questionIndex===activeQuestions.length-1
      ?"Hoàn thành đề"
      :"Câu tiếp theo";

    const completedNormal=activeQuestions
      .slice(0,questionIndex+1)
      .filter(item=>!item.isSpecial).length;
    progressBar.style.width=`${completedNormal/activeScoredCount*100}%`;
  }else{
    feedbackPanel.className="panel feedback";
    feedbackPanel.innerHTML="";
    hintButton.disabled=false;
    checkButton.disabled=!selectedAnswer;
    checkButton.classList.remove("hidden");
    nextButton.classList.add("hidden");
    nextButton.textContent=questionIndex===activeQuestions.length-1
      ?"Hoàn thành đề"
      :"Câu tiếp theo";
  }
}
function ensureAudio(){
  if(!audioContext)audioContext=new (window.AudioContext||window.webkitAudioContext)();
  if(audioContext.state==="suspended")audioContext.resume();
  return audioContext;
}
function playTone(correct){
  if(!soundEnabled)return;
  try{
    const context=ensureAudio();
    const now=context.currentTime;
    const master=context.createGain();
    master.gain.setValueAtTime(.0001,now);
    master.gain.exponentialRampToValueAtTime(correct?.16:.12,now+.015);
    master.gain.exponentialRampToValueAtTime(.0001,now+(correct?.65:.45));
    master.connect(context.destination);
    const notes=correct
      ?[{f:523.25,t:0,d:.16},{f:659.25,t:.13,d:.16},{f:783.99,t:.26,d:.25}]
      :[{f:220,t:0,d:.17},{f:174.61,t:.16,d:.24}];
    notes.forEach(note=>{
      const oscillator=context.createOscillator();
      const gain=context.createGain();
      oscillator.type=correct?"triangle":"sawtooth";
      oscillator.frequency.setValueAtTime(note.f,now+note.t);
      gain.gain.setValueAtTime(.0001,now+note.t);
      gain.gain.exponentialRampToValueAtTime(.8,now+note.t+.01);
      gain.gain.exponentialRampToValueAtTime(.0001,now+note.t+note.d);
      oscillator.connect(gain);
      gain.connect(master);
      oscillator.start(now+note.t);
      oscillator.stop(now+note.t+note.d+.03);
    });
  }catch(error){}
}
function showToast(correct,answer){
  const toast=document.getElementById("toast");
  toast.textContent=correct?"CHÍNH XÁC!":`SAI — ĐÁP ÁN ĐÚNG LÀ ${answer}`;
  toast.className=`toast ${correct?"good":"bad"} show`;
  clearTimeout(toastHandle);
  toastHandle=setTimeout(()=>toast.classList.remove("show"),1400);
}
function gradeQuestion(){
  if(!selectedAnswer||questionChecked)return;
  questionChecked=true;
  const question=activeQuestions[questionIndex];
  const correct=question.isSpecial||selectedAnswer===question.answer;

  optionsElement.querySelectorAll(".option").forEach(label=>{
    const input=label.querySelector("input");
    input.disabled=true;
    label.classList.add("disabled");
    if(question.isSpecial){
      if(input.value===selectedAnswer)label.classList.add("correct");
    }else{
      if(input.value===question.answer)label.classList.add("correct");
      if(input.value===selectedAnswer&&!correct)label.classList.add("wrong");
    }
  });

  if(correct){
    if(!question.isSpecial)score++;
    playTone(true);
    feedbackPanel.className="panel feedback good show";
    feedbackPanel.innerHTML=question.isSpecial
      ?`<strong>Đúng</strong><div class="feedback-source">Sơn / π</div>${question.explanation}`
      :`
        <strong>Đúng — đáp án ${question.answer}</strong>
        <div class="feedback-source">${question.source}</div>
        ${question.explanation}
      `;
  }else{
    playTone(false);
    wrongAnswers.push({
      q:question.q,
      picked:selectedAnswer,
      answer:question.answer,
      source:question.source,
      explanation:question.explanation
    });
    feedbackPanel.className="panel feedback bad show";
    feedbackPanel.innerHTML=`
      <strong>Sai — bạn chọn ${selectedAnswer}, đáp án đúng là ${question.answer}</strong>
      <div class="feedback-source">${question.source}</div>
      ${question.explanation}
    `;
  }

  showToast(correct,question.answer);
  liveScore.textContent=String(score);
  hintButton.disabled=true;
  checkButton.classList.add("hidden");
  nextButton.classList.remove("hidden");
  const completedNormal=activeQuestions
    .slice(0,questionIndex+1)
    .filter(item=>!item.isSpecial).length;
  progressBar.style.width=`${completedNormal/activeScoredCount*100}%`;
  saveCurrentProgress();
}
function finishQuiz(){
  clearInterval(timerHandle);
  const elapsed=Date.now()-startedAt;
  const stats=readStats(activeQuizId);
  stats.attempts++;
  if(!stats.bestTime||elapsed<stats.bestTime)stats.bestTime=elapsed;
  if(score>stats.bestScore)stats.bestScore=score;
  writeStats(activeQuizId,stats);
  clearProgress(activeQuizId);

  quizScreen.classList.add("hidden");
  resultScreen.classList.remove("hidden");

  const percentage=Math.round(score/activeScoredCount*100);
  const review=wrongAnswers.length
    ?`<div class="review"><h3>Các câu cần xem lại</h3>${wrongAnswers.map(item=>`
      <div class="review-item">
        <strong>${item.q}</strong><br>
        Bạn chọn ${item.picked}; đáp án đúng ${item.answer}.<br>
        <small>${item.source}</small><br>
        ${item.explanation}
      </div>`).join("")}</div>`
    :`<div class="review"><p>Bạn không làm sai câu nào.</p></div>`;

  resultScreen.innerHTML=`
    <div class="result-card">
      <div class="final-message">làm thế này chỉ được B thôi, ngu lắm con trai</div>
      <div class="result-score">${score}/${activeScoredCount}</div>
      <p>${percentage}% câu trả lời đúng</p>
      <div class="result-grid">
        <div class="result-stat"><span>Thời gian lần này</span><strong>${formatTime(elapsed)}</strong></div>
        <div class="result-stat"><span>Kỷ lục đề này</span><strong>${formatTime(stats.bestTime)}</strong></div>
        <div class="result-stat"><span>Lượt làm</span><strong>${stats.attempts}</strong></div>
      </div>
      <div class="result-actions">
        <button class="primary" id="retryButton">Làm lại</button>
        <button class="secondary" id="chooseButton">Chọn đề khác</button>
      </div>
      ${review}
    </div>
  `;
  document.getElementById("retryButton").addEventListener("click",()=>startQuiz(activeQuizId));
  document.getElementById("chooseButton").addEventListener("click",showMenu);
  buildMenu();
  window.scrollTo({top:0,behavior:"smooth"});
}
function showMenu(){
  if(activeQuizId!==null&&activeQuestions.length){
    saveCurrentProgress();
  }
  clearInterval(timerHandle);
  quizScreen.classList.add("hidden");
  resultScreen.classList.add("hidden");
  menuScreen.classList.remove("hidden");
  buildMenu();
  window.scrollTo({top:0,behavior:"smooth"});
}
hintButton.addEventListener("click",()=>{
  hintPanel.classList.toggle("show");
  hintButton.textContent=hintPanel.classList.contains("show")?"Đóng gợi ý":"Mở gợi ý";
});
checkButton.addEventListener("click",gradeQuestion);
nextButton.addEventListener("click",()=>{
  if(questionIndex<activeQuestions.length-1){
    questionIndex++;
    renderQuestion(false);
    saveCurrentProgress();
  }else{
    finishQuiz();
  }
});
leaveButton.addEventListener("click",showMenu);
document.getElementById("soundToggle").addEventListener("click",event=>{
  soundEnabled=!soundEnabled;
  event.currentTarget.textContent=soundEnabled?"🔊":"🔇";
  event.currentTarget.title=soundEnabled?"Tắt âm thanh":"Bật âm thanh";
});

window.addEventListener("beforeunload",saveCurrentProgress);
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="hidden")saveCurrentProgress();
});


window.PLDC_ONLINE_DATA={

  special:SPECIAL_QUESTION,
  sampleMixedQuestions:()=>sampleMixedQuestions(),
  insertSpecialQuestion:(questions)=>insertSpecialQuestion(questions),
  showOfflineMenu:()=>showMenu()
};

buildMenu();
</script>

  return String(value??"")
    .replaceAll("&","&amp;").replaceAll("<","&lt;")

function randomId(length=22){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789";
  const bytes=new Uint8Array(length);
  crypto.getRandomValues(bytes);
  return Array.from(bytes,b=>chars[b%chars.length]).join("");
}

  if(navigator.share){
    try{await navigator.share(payload);return;}
    catch(error){if(error?.name==="AbortError")return;}
  }

function formatTimeMs(ms){
  const total=Math.max(0,Math.floor((Number(ms)||0)/1000));
  const minutes=Math.floor(total/60);
  const seconds=total%60;
  return `${String(minutes).padStart(2,"0")}:${String(seconds).padStart(2,"0")}`;
}

async function initializeFirebase(force=false){
  if(state.configReady&&!force)return true;
  const config=getStoredConfig();
  if(!config)return false;
  try{
    state.app=getApps().length?getApp():initializeApp(config);
    state.auth=getAuth(state.app);
    state.db=getDatabase(state.app);
    if(!state.auth.currentUser){
      await signInAnonymously(state.auth);
    }
    state.uid=state.auth.currentUser.uid;
    state.configReady=true;
    return true;
  }catch(error){
    state.configReady=false;
    throw error;
  }
}

function quizOptions(){
  return DATA.menu.map(meta=>`<option value="${meta.id}">${esc(meta.title)} – ${meta.count} câu</option>`).join("");

async function createRoom(mode){
  try{
    const nameInput=mode==="duel"?"duelName":"supervisorName";
    const quizInput=mode==="duel"?"duelQuiz":"supervisorQuiz";
    const name=document.getElementById(nameInput).value.trim();
    const quizId=Number(document.getElementById(quizInput).value);
    if(!name){alert("Hãy nhập tên.");return;}

    const roomId=randomId(20);
    const playerToken=randomId(28);
    const orderedQuestions=buildQuestionOrder(quizId);
    const meta={
      creatorUid:state.uid,
      mode,
      quizId,
      status:"lobby",
      playerToken,
      questionUids:orderedQuestions.map(q=>q.uid),
      totalScored:orderedQuestions.filter(q=>!q.isSpecial).length,
      createdAt:serverTimestamp()
    };
    await set(ref(state.db,`rooms/${roomId}/public/meta`),meta);

    const role=mode==="duel"?"player":"supervisor";
    await set(ref(state.db,`rooms/${roomId}/public/members/${state.uid}`),{
      name,role,inviteToken:playerToken,
      ready:false,online:true,lastSeen:serverTimestamp(),
      progress:0,currentIndex:0,status:"lobby",score:null,finishedAt:null
    });

    state.roomId=roomId;
    state.inviteToken=playerToken;
    state.role=role;
    setRecentRoom(roomId,playerToken);
    history.replaceState({},document.title,baseInviteUrl(roomId,playerToken));
    await enterRoom(roomId,playerToken);
  }catch(error){
    alert("Không tạo được phòng: "+(error.message||error));
  }
}
async function inspectInvite(roomId,inviteToken){
  const snap=await get(ref(state.db,`rooms/${roomId}/public`));
  if(!snap.exists())throw new Error("Phòng không tồn tại hoặc đã bị xóa.");
  const publicData=snap.val();
  if(publicData.meta?.playerToken!==inviteToken)throw new Error("Link mời không hợp lệ.");
  return publicData;
}
async function openRoom(roomId,inviteToken){
  state.roomId=roomId;
  state.inviteToken=inviteToken;
  try{
    const publicData=await inspectInvite(roomId,inviteToken);
    const existing=publicData.members?.[state.uid];
    if(existing){
      state.role=existing.role;
      await enterRoom(roomId,inviteToken);
    }else{
      renderJoinRoom(publicData);
    }
  }catch(error){
    renderOnlineHome();
    alert(error.message||error);
  }
}

async function enterRoom(roomId,inviteToken){
  leaveRoomListeners();
  state.roomId=roomId;
  state.inviteToken=inviteToken;
  setRecentRoom(roomId,inviteToken);
  history.replaceState({},document.title,baseInviteUrl(roomId,inviteToken));
  showOnline();

  const publicRef=ref(state.db,roomPath("public"));
  state.roomUnsub=onValue(publicRef,snapshot=>{
    state.roomPublic=snapshot.val();
    if(!state.roomPublic){
      renderOnlineHome();
      alert("Phòng đã không còn tồn tại.");
      return;
    }
    state.role=state.roomPublic.members?.[state.uid]?.role||state.role;
    renderRoomState();
  });

  attachPresence();

  const ownAnswersRef=ref(state.db,roomPath(`answers/${state.uid}`));
  onValue(ownAnswersRef,snapshot=>{
    state.ownAnswers=snapshot.val()||{};
    if(state.role==="player"&&state.roomPublic?.meta?.status==="running"){
      renderRoomState();
    }
  });

  const memberSnap=await get(ref(state.db,roomPath(`public/members/${state.uid}`)));
  if(memberSnap.exists()){
    const member=memberSnap.val();
    state.currentIndex=Number(member.currentIndex)||0;
  }
}
function attachPresence(){
  if(state.connectionUnsub)state.connectionUnsub();
  const connectedRef=ref(state.db,".info/connected");
  state.connectionUnsub=onValue(connectedRef,async snapshot=>{
    state.connectionState=snapshot.val()===true;
    if(!state.connectionState)return;
    const memberRef=ref(state.db,roomPath(`public/members/${state.uid}`));
    try{
      await onDisconnect(memberRef).update({online:false,lastSeen:serverTimestamp()});
      await update(memberRef,{online:true,lastSeen:serverTimestamp()});
    }catch(error){}
  });
}
function renderRoomState(){
  const meta=state.roomPublic?.meta;
  const me=currentMember();
  if(!meta||!me)return;

  if(state.role==="supervisor"){
    if(!state.answersUnsub){
      state.answersUnsub=onValue(ref(state.db,roomPath("answers")),snapshot=>{
        state.answersData=snapshot.val()||{};
        renderSupervisor();
      });
    }
    renderSupervisor();
    return;
  }

  if(meta.status==="lobby"&&me.role==="player"&&me.status==="finished"){
    update(ref(state.db,roomPath(`public/members/${state.uid}`)),{
      ready:false,status:"lobby",progress:0,currentIndex:0,score:null,finishedAt:null
    });
    return;
  }

  if(meta.status==="lobby")renderLobby();
  else if(meta.status==="running"){
    if(me.status==="finished")renderWaitingOrResults();
    else renderPlayerGame();
  }else{
    renderWaitingOrResults();
  }
}

  document.getElementById("inviteButton").onclick=()=>copyOrShare(baseInviteUrl(state.roomId,state.inviteToken));
  document.getElementById("leaveOnlineButton").onclick=renderOnlineHome;
  const readyButton=document.getElementById("readyButton");

async function submitOnlineStep(){
  const questions=questionsForRoom();
  const answer=state.ownAnswers?.[state.currentIndex];
  if(!answer)return;

  const completedNormal=questions
    .slice(0,state.currentIndex+1)
    .filter(question=>!question.isSpecial).length;

  if(state.currentIndex<questions.length-1){
    state.currentIndex++;
    await update(ref(state.db,roomPath(`public/members/${state.uid}`)),{
      currentIndex:state.currentIndex,
      progress:completedNormal,
      status:"playing"
    });
    renderPlayerGame();
    return;
  }

  let finalScore=0;
  questions.forEach((question,index)=>{
    if(!question.isSpecial&&state.ownAnswers?.[index]===question.answer)finalScore++;
  });

  await update(ref(state.db,roomPath(`public/members/${state.uid}`)),{
    currentIndex:questions.length-1,
    progress:state.roomPublic.meta.totalScored,
    status:"finished",
    score:finalScore,
    finishedAt:serverTimestamp()
  });
}
function renderWaitingOrResults(){
  const roomPlayers=players();
  const bothFinished=roomPlayers.length===2&&roomPlayers.every(player=>player.status==="finished");
  if(bothFinished){
    renderOnlineResults();
    return;
  }
  const me=currentMember();
  onlineApp.innerHTML=`
    <div class="waiting-box">
      <h2>Bạn đã nộp bài</h2>
      <p>Điểm tạm thời của bạn: <strong>${Number(me.score)||0}/${state.roomPublic.meta.totalScored}</strong></p>
      <p>Đang chờ người còn lại hoàn thành. Bạn có thể rời phòng và quay lại bằng mục Phòng gần đây.</p>
      <div class="member-list">${renderMembersCards()}</div>
      <div class="online-actions" style="justify-content:center">
        <button class="secondary" id="leaveOnlineButton">Rời phòng</button>
        <button class="secondary" id="shareResultLink">Sao chép link phòng</button>
      </div>
    </div>
  `;
  document.getElementById("leaveOnlineButton").onclick=renderOnlineHome;
  document.getElementById("shareResultLink").onclick=()=>copyOrShare(baseInviteUrl(state.roomId,state.inviteToken));
}
function renderOnlineResults(){
  const roomPlayers=players().sort((a,b)=>{
    const scoreDiff=(Number(b.score)||0)-(Number(a.score)||0);
    if(scoreDiff!==0)return scoreDiff;
    return (Number(a.finishedAt)||Infinity)-(Number(b.finishedAt)||Infinity);
  });
  const tied=roomPlayers.length===2&&roomPlayers[0].score===roomPlayers[1].score&&roomPlayers[0].finishedAt===roomPlayers[1].finishedAt;
  onlineApp.innerHTML=`
    <div class="online-top">
      <div>
        <h2>Kết quả trận đấu</h2>
        <div class="online-sub">Xếp theo điểm; nếu bằng điểm thì người hoàn thành trước đứng trên.</div>
      </div>
      <button class="secondary" id="leaveOnlineButton">Về chế độ online</button>
    </div>
    <div class="result-board">
      ${roomPlayers.map((player,index)=>`
        <div class="result-player ${index===0&&!tied?"winner":""}">
          <div class="result-rank">${index+1}</div>
          <div>
            <strong>${esc(player.name)}</strong><br>
            ${onlineLabel(player)}
          </div>
          <div><strong>${Number(player.score)||0}/${state.roomPublic.meta.totalScored}</strong></div>
        </div>
      `).join("")}
    </div>
    <div class="online-actions">
      <button class="online-button" id="rematchButton">Đấu lại</button>
      <button class="secondary" id="shareResultLink">Mời / chia sẻ kết quả</button>
    </div>
  `;
  document.getElementById("leaveOnlineButton").onclick=renderOnlineHome;
  document.getElementById("shareResultLink").onclick=()=>copyOrShare(baseInviteUrl(state.roomId,state.inviteToken));
  document.getElementById("rematchButton").onclick=async()=>{
    if(state.roomPublic.meta.creatorUid!==state.uid){
      alert("Người tạo phòng cần bấm Đấu lại.");
      return;
    }
    const ordered=buildQuestionOrder(state.roomPublic.meta.quizId);
    const updates={
      status:"lobby",
      startedAt:null,
      questionUids:ordered.map(q=>q.uid),
      totalScored:ordered.filter(q=>!q.isSpecial).length
    };
    await set(ref(state.db,roomPath("answers")),null);
    await update(ref(state.db,roomPath("public/meta")),updates);
    for(const player of players()){
      if(player.uid===state.uid){
        await update(ref(state.db,roomPath(`public/members/${player.uid}`)),{
          ready:false,status:"lobby",progress:0,currentIndex:0,score:null,finishedAt:null
        });
      }
    }
  };
}
function renderSupervisor(){
  const meta=state.roomPublic?.meta;
  if(!meta)return;
  const roomPlayers=players();
  const allReady=roomPlayers.length===2&&roomPlayers.every(player=>player.ready);
  const bothFinished=roomPlayers.length===2&&roomPlayers.every(player=>player.status==="finished");

  onlineApp.innerHTML=`
    <div class="online-top">
      <div>
        <h2>Giám sát phòng – Đề ${meta.quizId}</h2>
        <div class="online-sub">Xem trạng thái và chi tiết bài làm của hai người chơi.</div>
      </div>
      <div class="online-actions">
        <button class="secondary" id="inviteButton">Mời người chơi</button>
        <button class="secondary" id="leaveOnlineButton">Rời phòng</button>
      </div>
    </div>
    <div class="member-list">${renderMembersCards()}</div>
    ${meta.status==="lobby"&&allReady
      ?'<div class="online-actions"><button class="online-button" id="startBattleButton">Bắt đầu thi đấu</button></div>'
      :""}
    ${meta.status!=="lobby"?renderSupervisorDetails():""}
    ${bothFinished?'<div class="online-status success">Cả hai người chơi đã hoàn thành.</div>':""}
  `;
  document.getElementById("inviteButton").onclick=()=>copyOrShare(baseInviteUrl(state.roomId,state.inviteToken));
  document.getElementById("leaveOnlineButton").onclick=renderOnlineHome;
  const startButton=document.getElementById("startBattleButton");
  if(startButton)startButton.onclick=startBattle;
}
function renderSupervisorDetails(){
  const questions=questionsForRoom();
  const roomPlayers=players();
  if(!roomPlayers.length)return '<div class="online-status">Chưa có người chơi.</div>';
  return roomPlayers.map(player=>{
    const answers=state.answersData?.[player.uid]||{};
    return `
      <div class="online-card" style="margin-top:14px">
        <h3>${esc(player.name)} – ${Number(player.score)||0}/${state.roomPublic.meta.totalScored}</h3>
        <div style="overflow:auto">
          <table class="supervisor-table">
            <thead><tr><th>Câu</th><th>Nội dung</th><th>Đã chọn</th><th>Đáp án</th><th>Kết quả</th></tr></thead>
            <tbody>
              ${questions.map((question,index)=>{
                const chosen=answers[index]||"—";
                const isSpecial=Boolean(question.isSpecial);
                const correct=isSpecial||chosen===question.answer;
                return `
                  <tr>
                    <td>${isSpecial?"Sơn / π":index+1}</td>
                    <td>${esc(question.q)}</td>
                    <td>${esc(chosen)}</td>
                    <td>${isSpecial?"—":question.answer}</td>
                    <td class="${chosen==="—"?"":correct?"answer-right":"answer-wrong"}">
                      ${chosen==="—"?"Chưa làm":correct?"Đúng":"Sai"}
                    </td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      </div>
    `;
  }).join("");
}
async function bootOnline(){
  updateRecentButton();
  const params=new URLSearchParams(location.search);
  const roomId=params.get("room");
  const inviteToken=params.get("invite");

  onlineModeButton.onclick=async()=>{
    showOnline();
    try{
      const ready=await initializeFirebase();
      if(!ready)renderFirebaseSetup();
      else renderOnlineHome();
    }catch(error){
      showOnline();
      onlineApp.innerHTML=`
        <div class="online-top">
          <div>
            <h2>Không kết nối được Firebase</h2>
            <div class="online-sub">Kiểm tra Anonymous Authentication, Security Rules và Authorized domains.</div>
          </div>
          <button class="secondary" id="onlineBackButton">Quay lại</button>
        </div>
        <div class="online-status error">${esc(error.message||String(error))}</div>
        <div class="connection-note">
          Trong Firebase Authentication → Cài đặt → Miền được ủy quyền, hãy thêm
          <strong>thaijk37-wq.github.io</strong>.
        </div>
      `;
      document.getElementById("onlineBackButton").onclick=showOffline;
    }
  };

  recentOnlineRoomButton.onclick=async()=>{
    const recent=readRecentRoom();
    if(!recent)return;
    showOnline();
    try{
      const ready=await initializeFirebase();
      if(!ready){renderFirebaseSetup();return;}
      await openRoom(recent.roomId,recent.inviteToken);
    }catch(error){renderFirebaseSetup(error.message||error);}
  };

  if(roomId&&inviteToken){
    showOnline();
    try{
      const ready=await initializeFirebase();
      if(!ready)throw new Error("Không tải được cấu hình Firebase.");
      state.roomId=roomId;
      state.inviteToken=inviteToken;
      await openRoom(roomId,inviteToken);
    }catch(error){
      renderFirebaseSetup(error.message||"Không mở được phòng.");
    }
  }
}

bootOnline();
</script>
